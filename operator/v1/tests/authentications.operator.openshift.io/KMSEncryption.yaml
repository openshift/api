apiVersion: apiextensions.k8s.io/v1 # Hack because controller-gen complains if we don't have this
name: "Authentication"
crdName: authentications.operator.openshift.io
featureGates:
  - KMSEncryption
tests:
  onUpdate:
    - name: Should accept a minimal healthy health report
      initial: |
        apiVersion: operator.openshift.io/v1
        kind: Authentication
        metadata:
          name: cluster
        spec: {}
      updated: |
        apiVersion: operator.openshift.io/v1
        kind: Authentication
        metadata:
          name: cluster
        spec: {}
        status:
          oauthAPIServer:
            encryptionStatus:
              healthReports:
              - nodeName: node-a
                keyId: key-1
                status: Healthy
                lastCheckedTime: "2026-01-01T00:00:00Z"
                kekId: kek-1
      expected: |
        apiVersion: operator.openshift.io/v1
        kind: Authentication
        metadata:
          name: cluster
        spec:
          logLevel: Normal
          operatorLogLevel: Normal
        status:
          oauthAPIServer:
            encryptionStatus:
              healthReports:
              - nodeName: node-a
                keyId: key-1
                status: Healthy
                lastCheckedTime: "2026-01-01T00:00:00Z"
                kekId: kek-1
    - name: Should accept multiple health reports with unique nodeName/keyId combinations
      initial: |
        apiVersion: operator.openshift.io/v1
        kind: Authentication
        metadata:
          name: cluster
        spec: {}
      updated: |
        apiVersion: operator.openshift.io/v1
        kind: Authentication
        metadata:
          name: cluster
        spec: {}
        status:
          oauthAPIServer:
            encryptionStatus:
              healthReports:
              - nodeName: node-a
                keyId: key-1
                status: Healthy
                lastCheckedTime: "2026-01-01T00:00:00Z"
                kekId: kek-1
              - nodeName: node-a
                keyId: key-2
                status: Unhealthy
                lastCheckedTime: "2026-01-01T00:00:00Z"
                kekId: kek-2
                detail: plugin unreachable
              - nodeName: node-b
                keyId: key-1
                status: Error
                lastCheckedTime: "2026-01-01T00:00:00Z"
                kekId: arn:aws:kms:us-east-1:123456789012:key/abc
                detail: authentication failed
      expected: |
        apiVersion: operator.openshift.io/v1
        kind: Authentication
        metadata:
          name: cluster
        spec:
          logLevel: Normal
          operatorLogLevel: Normal
        status:
          oauthAPIServer:
            encryptionStatus:
              healthReports:
              - nodeName: node-a
                keyId: key-1
                status: Healthy
                lastCheckedTime: "2026-01-01T00:00:00Z"
                kekId: kek-1
              - nodeName: node-a
                keyId: key-2
                status: Unhealthy
                lastCheckedTime: "2026-01-01T00:00:00Z"
                kekId: kek-2
                detail: plugin unreachable
              - nodeName: node-b
                keyId: key-1
                status: Error
                lastCheckedTime: "2026-01-01T00:00:00Z"
                kekId: arn:aws:kms:us-east-1:123456789012:key/abc
                detail: authentication failed
    - name: Should reject duplicate nodeName/keyId health reports
      initial: |
        apiVersion: operator.openshift.io/v1
        kind: Authentication
        metadata:
          name: cluster
        spec: {}
        status:
          oauthAPIServer:
            encryptionStatus:
              healthReports:
              - nodeName: node-a
                keyId: key-1
                status: Healthy
                lastCheckedTime: "2026-01-01T00:00:00Z"
                kekId: kek-1
      updated: |
        apiVersion: operator.openshift.io/v1
        kind: Authentication
        metadata:
          name: cluster
        spec: {}
        status:
          oauthAPIServer:
            encryptionStatus:
              healthReports:
              - nodeName: node-a
                keyId: key-1
                status: Healthy
                lastCheckedTime: "2026-01-01T00:00:00Z"
                kekId: kek-1
              - nodeName: node-a
                keyId: key-1
                status: Unhealthy
                lastCheckedTime: "2026-01-01T00:00:00Z"
                kekId: kek-2
                detail: plugin error
      expectedStatusError: "Duplicate value"
    - name: Should reject an invalid nodeName in health reports
      initial: |
        apiVersion: operator.openshift.io/v1
        kind: Authentication
        metadata:
          name: cluster
        spec: {}
      updated: |
        apiVersion: operator.openshift.io/v1
        kind: Authentication
        metadata:
          name: cluster
        spec: {}
        status:
          oauthAPIServer:
            encryptionStatus:
              healthReports:
              - nodeName: INVALID
                keyId: key-1
                status: Healthy
                lastCheckedTime: "2026-01-01T00:00:00Z"
                kekId: kek-1
      expectedStatusError: "nodeName must be a lowercase RFC 1123 subdomain"
