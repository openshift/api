apiVersion: apiextensions.k8s.io/v1 # Hack because controller-gen complains if we don't have this
name: "Ingress"
crdName: ingresses.operator.openshift.io
featureGate: GatewayAPIManagementMode
tests:
  onCreate:
  - name: Should be able to create a minimal Ingress with default managementMode
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: Ingress
      metadata:
        name: cluster
      spec: {}
    expected: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: Ingress
      metadata:
        name: cluster
      spec: {}
  - name: Should not be able to create an Ingress with a custom name
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: Ingress
      metadata:
        name: custom-name
      spec: {}
    expectedError: "Invalid value: \"object\": ingress is a singleton; the .metadata.name field must be 'cluster'"
  - name: Should be able to create an Ingress with managementMode set to Managed
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: Ingress
      metadata:
        name: cluster
      spec:
        gatewayAPI:
          managementMode: Managed
    expected: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: Ingress
      metadata:
        name: cluster
      spec:
        gatewayAPI:
          managementMode: Managed
  - name: Should be able to create an Ingress with managementMode set to Unmanaged
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: Ingress
      metadata:
        name: cluster
      spec:
        gatewayAPI:
          managementMode: Unmanaged
    expected: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: Ingress
      metadata:
        name: cluster
      spec:
        gatewayAPI:
          managementMode: Unmanaged
  - name: Should not be able to create an Ingress with an invalid managementMode
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: Ingress
      metadata:
        name: cluster
      spec:
        gatewayAPI:
          managementMode: InvalidMode
    expectedError: "spec.gatewayAPI.managementMode: Unsupported value: \"InvalidMode\": supported values: \"Managed\", \"Unmanaged\""
  - name: Should default managementMode to Managed when gatewayAPI is specified without it
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: Ingress
      metadata:
        name: cluster
      spec:
        gatewayAPI: {}
    expected: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: Ingress
      metadata:
        name: cluster
      spec:
        gatewayAPI:
          managementMode: Managed
  onUpdate:
  - name: Should be able to update managementMode from Managed to Unmanaged
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: Ingress
      metadata:
        name: cluster
      spec:
        gatewayAPI:
          managementMode: Managed
    updated: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: Ingress
      metadata:
        name: cluster
      spec:
        gatewayAPI:
          managementMode: Unmanaged
    expected: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: Ingress
      metadata:
        name: cluster
      spec:
        gatewayAPI:
          managementMode: Unmanaged
  - name: Should be able to update managementMode from Unmanaged to Managed
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: Ingress
      metadata:
        name: cluster
      spec:
        gatewayAPI:
          managementMode: Unmanaged
    updated: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: Ingress
      metadata:
        name: cluster
      spec:
        gatewayAPI:
          managementMode: Managed
    expected: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: Ingress
      metadata:
        name: cluster
      spec:
        gatewayAPI:
          managementMode: Managed
  - name: Should not be able to update managementMode to an invalid value
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: Ingress
      metadata:
        name: cluster
      spec:
        gatewayAPI:
          managementMode: Managed
    updated: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: Ingress
      metadata:
        name: cluster
      spec:
        gatewayAPI:
          managementMode: InvalidMode
    expectedError: "spec.gatewayAPI.managementMode: Unsupported value: \"InvalidMode\": supported values: \"Managed\", \"Unmanaged\""
