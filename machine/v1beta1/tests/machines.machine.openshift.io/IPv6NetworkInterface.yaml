            zone: us-central1-a
            networkInterfaces:
            - network: test-network
              subnetwork: test-subnet
              stackType: DualStack
              ipv6AccessType: Internal
  - name: Should allow changing IPv6 address on DualStack interface
    initial: |
      apiVersion: machine.openshift.io/v1beta1
      kind: Machine
      spec:
        providerSpec:
          value:
            apiVersion: machine.openshift.io/v1beta1
            kind: GCPMachineProviderSpec
            machineType: n1-standard-4
            region: us-central1
            zone: us-central1-a
            networkInterfaces:
            - network: test-network
              subnetwork: test-subnet
              stackType: DualStack
              ipv6Address: "2001:db8::1"
    updated: |
      apiVersion: machine.openshift.io/v1beta1
      kind: Machine
