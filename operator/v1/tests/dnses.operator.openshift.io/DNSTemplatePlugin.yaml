apiVersion: apiextensions.k8s.io/v1 # Hack because controller-gen complains if we don't have this
name: "DNS"
crdName: dnses.operator.openshift.io
featureGates:
- DNSTemplatePlugin
tests:
  onCreate:
    - name: Should be able to create a DNS with template - catch-all zone
      initial: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec:
          template:
            zones: ["."]
            queryType: AAAA
            queryClass: IN
            action:
              rcode: NOERROR
      expected: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec:
          logLevel: Normal
          operatorLogLevel: Normal
          upstreamResolvers:
            policy: Sequential
            upstreams:
            - port: 53
              type: SystemResolvConf
          template:
            zones: ["."]
            queryType: AAAA
            queryClass: IN
            action:
              rcode: NOERROR
    - name: Should be able to create a DNS with template - specific zone
      initial: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec:
          template:
            zones: ["example.com"]
            queryType: AAAA
            queryClass: IN
            action:
              rcode: NOERROR
      expected: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec:
          logLevel: Normal
          operatorLogLevel: Normal
          upstreamResolvers:
            policy: Sequential
            upstreams:
            - port: 53
              type: SystemResolvConf
          template:
            zones: ["example.com"]
            queryType: AAAA
            queryClass: IN
            action:
              rcode: NOERROR
    - name: Should be able to create a DNS with template - multiple zones
      initial: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec:
          template:
            zones: ["example.com", "test.com", "corp.com"]
            queryType: AAAA
            queryClass: IN
            action:
              rcode: NOERROR
      expected: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec:
          logLevel: Normal
          operatorLogLevel: Normal
          upstreamResolvers:
            policy: Sequential
            upstreams:
            - port: 53
              type: SystemResolvConf
          template:
            zones: ["example.com", "test.com", "corp.com"]
            queryType: AAAA
            queryClass: IN
            action:
              rcode: NOERROR
    - name: Should be able to create a DNS without template (optional field)
      initial: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec:
          servers: []
      expected: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec:
          logLevel: Normal
          operatorLogLevel: Normal
          upstreamResolvers:
            policy: Sequential
            upstreams:
            - port: 53
              type: SystemResolvConf
          servers: []
    - name: Should reject DNS with template - missing zones
      initial: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec:
          template:
            queryType: AAAA
            queryClass: IN
            action:
              rcode: NOERROR
      expectedError: "Required value"
    - name: Should reject DNS with template - empty zones array
      initial: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec:
          template:
            zones: []
            queryType: AAAA
            queryClass: IN
            action:
              rcode: NOERROR
      expectedError: "should have at least 1 items"
    - name: Should reject DNS with template - invalid queryType
      initial: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec:
          template:
            zones: ["."]
            queryType: A
            queryClass: IN
            action:
              rcode: NOERROR
      expectedError: 'Unsupported value: "A": supported values: "AAAA"'
    - name: Should reject DNS with template - invalid queryClass
      initial: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec:
          template:
            zones: ["."]
            queryType: AAAA
            queryClass: CH
            action:
              rcode: NOERROR
      expectedError: 'Unsupported value: "CH": supported values: "IN"'
    - name: Should reject DNS with template - missing action
      initial: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec:
          template:
            zones: ["."]
            queryType: AAAA
            queryClass: IN
      expectedError: "Required value"
    - name: Should reject DNS with template - missing rcode
      initial: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec:
          template:
            zones: ["."]
            queryType: AAAA
            queryClass: IN
            action: {}
      expectedError: "Required value"
    - name: Should reject DNS with template - invalid rcode
      initial: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec:
          template:
            zones: ["."]
            queryType: AAAA
            queryClass: IN
            action:
              rcode: NXDOMAIN
      expectedError: 'Unsupported value: "NXDOMAIN": supported values: "NOERROR"'
    - name: Should reject DNS with template - too many zones (more than 15)
      initial: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec:
          template:
            zones: ["zone1.com", "zone2.com", "zone3.com", "zone4.com", "zone5.com", "zone6.com", "zone7.com", "zone8.com", "zone9.com", "zone10.com", "zone11.com", "zone12.com", "zone13.com", "zone14.com", "zone15.com", "zone16.com"]
            queryType: AAAA
            queryClass: IN
            action:
              rcode: NOERROR
      expectedError: "must have at most 15 items"
    - name: Should reject DNS with template - invalid zone with underscore
      initial: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec:
          template:
            zones: ["invalid_domain.com"]
            queryType: AAAA
            queryClass: IN
            action:
              rcode: NOERROR
      expectedError: "in body should match '^(\\.|[a-z0-9]([-a-z0-9]*[a-z0-9])?(\\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*)$'"
    - name: Should reject DNS with template - invalid zone with trailing dot
      initial: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec:
          template:
            zones: ["example.com."]
            queryType: AAAA
            queryClass: IN
            action:
              rcode: NOERROR
      expectedError: "in body should match '^(\\.|[a-z0-9]([-a-z0-9]*[a-z0-9])?(\\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*)$'"
    - name: Should reject DNS with template - invalid zone with uppercase
      initial: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec:
          template:
            zones: ["Example.com"]
            queryType: AAAA
            queryClass: IN
            action:
              rcode: NOERROR
      expectedError: "in body should match '^(\\.|[a-z0-9]([-a-z0-9]*[a-z0-9])?(\\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*)$'"
    - name: Should reject DNS with template - invalid zone starting with hyphen
      initial: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec:
          template:
            zones: ["-example.com"]
            queryType: AAAA
            queryClass: IN
            action:
              rcode: NOERROR
      expectedError: "in body should match '^(\\.|[a-z0-9]([-a-z0-9]*[a-z0-9])?(\\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*)$'"
    - name: Should reject DNS with template - invalid zone ending with hyphen
      initial: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec:
          template:
            zones: ["example-.com"]
            queryType: AAAA
            queryClass: IN
            action:
              rcode: NOERROR
      expectedError: "in body should match '^(\\.|[a-z0-9]([-a-z0-9]*[a-z0-9])?(\\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*)$'"
    - name: Should accept DNS with template - valid subdomain zones
      initial: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec:
          template:
            zones: ["sub.example.com", "deep.sub.example.com", "a-b.example.com"]
            queryType: AAAA
            queryClass: IN
            action:
              rcode: NOERROR
      expected: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec:
          logLevel: Normal
          operatorLogLevel: Normal
          upstreamResolvers:
            policy: Sequential
            upstreams:
            - port: 53
              type: SystemResolvConf
          template:
            zones: ["sub.example.com", "deep.sub.example.com", "a-b.example.com"]
            queryType: AAAA
            queryClass: IN
            action:
              rcode: NOERROR
    - name: Should reject DNS with template - duplicate zones (listType=set)
      initial: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec:
          template:
            zones: ["example.com", "example.com"]
            queryType: AAAA
            queryClass: IN
            action:
              rcode: NOERROR
      expectedError: "zones"
  onUpdate:
    - name: Should be able to add template to existing DNS
      initial: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec: {}
      updated: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec:
          template:
            zones: ["."]
            queryType: AAAA
            queryClass: IN
            action:
              rcode: NOERROR
      expected: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec:
          logLevel: Normal
          operatorLogLevel: Normal
          upstreamResolvers:
            policy: Sequential
            upstreams:
            - port: 53
              type: SystemResolvConf
          template:
            zones: ["."]
            queryType: AAAA
            queryClass: IN
            action:
              rcode: NOERROR
    - name: Should be able to update template zones
      initial: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec:
          template:
            zones: ["example.com"]
            queryType: AAAA
            queryClass: IN
            action:
              rcode: NOERROR
      updated: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec:
          template:
            zones: ["example.com", "test.com"]
            queryType: AAAA
            queryClass: IN
            action:
              rcode: NOERROR
      expected: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec:
          logLevel: Normal
          operatorLogLevel: Normal
          upstreamResolvers:
            policy: Sequential
            upstreams:
            - port: 53
              type: SystemResolvConf
          template:
            zones: ["example.com", "test.com"]
            queryType: AAAA
            queryClass: IN
            action:
              rcode: NOERROR
    - name: Should be able to remove template from existing DNS
      initial: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec:
          template:
            zones: ["."]
            queryType: AAAA
            queryClass: IN
            action:
              rcode: NOERROR
      updated: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec: {}
      expected: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec:
          logLevel: Normal
          operatorLogLevel: Normal
          upstreamResolvers:
            policy: Sequential
            upstreams:
            - port: 53
              type: SystemResolvConf
    - name: Should reject update with invalid queryType
      initial: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec:
          template:
            zones: ["."]
            queryType: AAAA
            queryClass: IN
            action:
              rcode: NOERROR
      updated: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec:
          template:
            zones: ["."]
            queryType: CNAME
            queryClass: IN
            action:
              rcode: NOERROR
      expectedError: 'Unsupported value: "CNAME"'
    - name: Should reject update with empty zones
      initial: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec:
          template:
            zones: ["."]
            queryType: AAAA
            queryClass: IN
            action:
              rcode: NOERROR
      updated: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec:
          template:
            zones: []
            queryType: AAAA
            queryClass: IN
            action:
              rcode: NOERROR
      expectedError: "should have at least 1 items"
    - name: Should reject update with invalid zone format
      initial: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec:
          template:
            zones: ["example.com"]
            queryType: AAAA
            queryClass: IN
            action:
              rcode: NOERROR
      updated: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec:
          template:
            zones: ["invalid_zone.com"]
            queryType: AAAA
            queryClass: IN
            action:
              rcode: NOERROR
      expectedError: "in body should match '^(\\.|[a-z0-9]([-a-z0-9]*[a-z0-9])?(\\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*)$'"
    - name: Should reject update with too many zones
      initial: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec:
          template:
            zones: ["example.com"]
            queryType: AAAA
            queryClass: IN
            action:
              rcode: NOERROR
      updated: |
        apiVersion: operator.openshift.io/v1
        kind: DNS
        spec:
          template:
            zones: ["zone1.com", "zone2.com", "zone3.com", "zone4.com", "zone5.com", "zone6.com", "zone7.com", "zone8.com", "zone9.com", "zone10.com", "zone11.com", "zone12.com", "zone13.com", "zone14.com", "zone15.com", "zone16.com"]
            queryType: AAAA
            queryClass: IN
            action:
              rcode: NOERROR
      expectedError: "must have at most 15 items"
