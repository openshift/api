apiVersion: apiextensions.k8s.io/v1 # Hack because controller-gen complains if we don't have this
name: "Infrastructure"
crdName: infrastructures.config.openshift.io
featureGates:
- GCPDualStackInstall
tests:
  onCreate:
    - name: Should be able to create a minimal Infrastructure
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Infrastructure
        spec: {} # No spec is required for a Infrastructure
      expected: |
        apiVersion: config.openshift.io/v1
        kind: Infrastructure
        spec: {}
  onUpdate:
    - name: ipFamily should default to `IPv4` when not specified
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Infrastructure
        spec:
          platformSpec:
            gcp: {}
            type: GCP
        status:
          controlPlaneTopology: HighlyAvailable
          infrastructureTopology: HighlyAvailable
          platform: GCP
          platformStatus:
            gcp: {}
            type: GCP
      updated: |
        apiVersion: config.openshift.io/v1
        kind: Infrastructure
        spec:
          platformSpec:
            type: GCP
            gcp: {}
        status:
          controlPlaneTopology: HighlyAvailable
          infrastructureTopology: HighlyAvailable
          platform: GCP
          platformStatus:
            gcp: {}
            type: GCP
      expected: |
        apiVersion: config.openshift.io/v1
        kind: Infrastructure
        spec:
          platformSpec:
            type: GCP
            gcp: {}
        status:
          controlPlaneTopology: HighlyAvailable
          cpuPartitioning: None
          infrastructureTopology: HighlyAvailable
          platform: GCP
          platformStatus:
            gcp:
              cloudLoadBalancerConfig:
                dnsType: PlatformDefault
              ipFamily: IPv4
            type: GCP
    - name: should be able to set ipFamily to non-default value of `DualStack`
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Infrastructure
        spec:
          platformSpec:
            gcp: {}
            type: GCP
      updated: |
        apiVersion: config.openshift.io/v1
        kind: Infrastructure
        spec:
          platformSpec:
            type: GCP
            gcp: {}
        status:
          controlPlaneTopology: HighlyAvailable
          infrastructureTopology: HighlyAvailable
          platform: GCP
          platformStatus:
            gcp:
              ipFamily: DualStack
            type: GCP
      expected: |
        apiVersion: config.openshift.io/v1
        kind: Infrastructure
        spec:
          platformSpec:
            type: GCP
            gcp: {}
        status:
          controlPlaneTopology: HighlyAvailable
          cpuPartitioning: None
          infrastructureTopology: HighlyAvailable
          platform: GCP
          platformStatus:
            gcp:
              cloudLoadBalancerConfig:
                dnsType: PlatformDefault
              ipFamily: DualStack
            type: GCP
    - name: Should not allow changing the immutable ipFamily field
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Infrastructure
        spec:
          platformSpec:
            gcp: {}
            type: GCP
        status:
          controlPlaneTopology: HighlyAvailable
          infrastructureTopology: HighlyAvailable
          platform: GCP
          platformStatus:
            gcp:
              ipFamily: DualStack
            type: GCP
      updated: |
        apiVersion: config.openshift.io/v1
        kind: Infrastructure
        spec:
          platformSpec:
            type: GCP
            gcp: {}
        status:
          controlPlaneTopology: HighlyAvailable
          infrastructureTopology: HighlyAvailable
          platform: GCP
          platformStatus:
            gcp:
              ipFamily: IPv4
            type: GCP
      expectedStatusError: "status.platformStatus.gcp.ipFamily: Invalid value: \"string\": ipFamily is immutable once set"
    - name: Should not accept random strings for IpFamily
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Infrastructure
        spec:
          platformSpec:
            gcp: {}
            type: GCP
        status:
          controlPlaneTopology: HighlyAvailable
          infrastructureTopology: HighlyAvailable
          platform: GCP
          platformStatus:
            gcp:
              ipFamily: IPv4
            type: GCP
      updated: |
        apiVersion: config.openshift.io/v1
        kind: Infrastructure
        spec:
          platformSpec:
            type: GCP
            gcp: {}
        status:
          controlPlaneTopology: HighlyAvailable
          infrastructureTopology: HighlyAvailable
          platform: GCP
          platformStatus:
            gcp:
              ipFamily: "OpenShift"
            type: GCP
      expectedStatusError: "status.platformStatus.gcp.ipFamily: Unsupported value: \"OpenShift\": supported values: \"IPv4\", \"DualStack\""
