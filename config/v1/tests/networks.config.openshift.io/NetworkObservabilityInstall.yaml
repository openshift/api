apiVersion: apiextensions.k8s.io/v1 # Hack because controller-gen complains if we don't have this
name: "Network"
crdName: networks.config.openshift.io
featureGates:
  - NetworkObservabilityInstall
tests:
  onCreate:
    - name: Should not be able to set NetworkObservability with empty string
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Network
        spec:
          networkObservability:
            installationPolicy: ""
      expectedError: "Unsupported value: \"\": supported values: \"InstallAndEnable\", \"NoAction\""
    - name: Should be able to set NetworkObservability InstallAndEnable
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Network
        spec:
          networkObservability:
            installationPolicy: InstallAndEnable
      expected: |
        apiVersion: config.openshift.io/v1
        kind: Network
        spec:
          networkObservability:
            installationPolicy: InstallAndEnable
    - name: Should be able to set NetworkObservability NoAction
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Network
        spec:
          networkObservability:
            installationPolicy: NoAction
      expected: |
        apiVersion: config.openshift.io/v1
        kind: Network
        spec:
          networkObservability:
            installationPolicy: NoAction
