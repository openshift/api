apiVersion: apiextensions.k8s.io/v1 # Hack because controller-gen complains if we don't have this
name: "[FeatureGate] ImageModeStatusReporting"
crdName: machineconfignodes.machineconfiguration.openshift.io
featureGates:
- ImageModeStatusReporting
tests:
  onCreate:
    - name: Should be able to create MachineConfigNode when spec.configImage ImageModeStatusReporting is enabled
      initial: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: MachineConfigNode
        metadata:
          name: test-imagemodestatusreporting
        spec:
          node:
            name: test-imagemodestatusreporting
          pool:
            name: worker
          configVersion:
            desired: rendered-worker-abc
          configImage: 
            desiredImage: image-registry.openshift-image-registry.svc:5000/openshift-machine-config-operator/os-images:latest
      expected: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: MachineConfigNode
        metadata:
          name: test-imagemodestatusreporting
        spec:
          node:
            name: test-imagemodestatusreporting
          pool:
            name: worker
          configVersion:
            desired: rendered-worker-abc
          configImage:
            desiredImage: image-registry.openshift-image-registry.svc:5000/openshift-machine-config-operator/os-images:latest
    - name: Should be able to create MachineConfigNode with status.configImage when ImageModeStatusReporting is enabled when the current and desired images are different
      initial: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: MachineConfigNode
        metadata:
          name: test-imagemodestatusreporting
        spec:
          node:
            name: test-imagemodestatusreporting
          pool:
            name: worker
          configVersion:
            desired: rendered-worker-abc
          configImage:
            desiredImage: image-registry.openshift-image-registry.svc:5000/openshift-machine-config-operator/os-images@sha256:c47856f56e1fdb7c9d10a1658e4ea85fbea44d71fb0e82898d152b47e0f894c6
        status:
          configImage:
            desiredImage: image-registry.openshift-image-registry.svc:5000/openshift-machine-config-operator/os-images:latest
            currentImage: image-registry.openshift-image-registry.svc:5000/openshift-machine-config-operator/os-images@sha256:c47856f56e1fdb7c9d10a1658e4ea85fbea44d71fb0e82898d152b47e0f894c6
      expected: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: MachineConfigNode
        metadata:
          name: test-imagemodestatusreporting
        spec:
          node:
            name: test-imagemodestatusreporting
          pool:
            name: worker
          configVersion:
            desired: rendered-worker-abc
          configImage:
            desiredImage: image-registry.openshift-image-registry.svc:5000/openshift-machine-config-operator/os-images@sha256:c47856f56e1fdb7c9d10a1658e4ea85fbea44d71fb0e82898d152b47e0f894c6
    - name: Should be able to create MachineConfigNode with status.configImage when ImageModeStatusReporting is enabled when the current and desired images are the same
      initial: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: MachineConfigNode
        metadata:
          name: test-imagemodestatusreporting
        spec:
          node:
            name: test-imagemodestatusreporting
          pool:
            name: worker
          configVersion:
            desired: rendered-worker-abc
          configImage: 
            desiredImage: image-registry.openshift-image-registry.svc:5000/openshift-machine-config-operator/os-images:latest
        status:
          configImage: 
            desiredImage: image-registry.openshift-image-registry.svc:5000/openshift-machine-config-operator/os-images:latest
            currentImage: image-registry.openshift-image-registry.svc:5000/openshift-machine-config-operator/os-images:latest
      expected: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: MachineConfigNode
        metadata:
          name: test-imagemodestatusreporting
        spec:
          node:
            name: test-imagemodestatusreporting
          pool:
            name: worker
          configVersion:
            desired: rendered-worker-abc
          configImage: 
            desiredImage: image-registry.openshift-image-registry.svc:5000/openshift-machine-config-operator/os-images:latest
    - name: Should be able to create MachineConfigNode with status.configImage when ImageModeStatusReporting is enabled without the current image provided
      initial: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: MachineConfigNode
        metadata:
          name: test-imagemodestatusreporting
        spec:
          node:
            name: test-imagemodestatusreporting
          pool:
            name: worker
          configVersion:
            desired: rendered-worker-abc
          configImage: 
            desiredImage: image-registry.openshift-image-registry.svc:5000/openshift-machine-config-operator/os-images:latest
        status:
          configImage: 
            desiredImage: image-registry.openshift-image-registry.svc:5000/openshift-machine-config-operator/os-images@sha256:c47856f56e1fdb7c9d10a1658e4ea85fbea44d71fb0e82898d152b47e0f894c6
            currentImage:
      expected: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: MachineConfigNode
        metadata:
          name: test-imagemodestatusreporting
        spec:
          node:
            name: test-imagemodestatusreporting
          pool:
            name: worker
          configVersion:
            desired: rendered-worker-abc
          configImage: 
            desiredImage: image-registry.openshift-image-registry.svc:5000/openshift-machine-config-operator/os-images:latest
    - name: spec.configImage.desiredImage should enforce MaxLength.
      initial: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: MachineConfigNode
        metadata:
          name: test-imagemodestatusreporting
        spec:
          node:
            name: test-imagemodestatusreporting
          pool:
            name: worker
          configVersion:
            desired: rendered-worker-abc
          configImage:
            desiredImage: registry.example.com/a/very/very/very/very/very/very/very/very/very/very/very/very/very/very/very/very/very/very/very/very/very/very/very/very/very/very/very/very/very/very/very/very/very/very/very/very/very/very/very/very/very/very/very/very/very/very/j
      expectedError: "MachineConfigNode.machineconfiguration.openshift.io \"test-imagemodestatusreporting\" is invalid: [spec.configImage.desiredImage: Too long: may not be more than 253 bytes, <nil>: Invalid value: \"null\": some validation rules were not checked because the object was invalid; correct the existing errors to complete validation]"
    - name: ConfigImage is required
      initial: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: MachineConfigNode
        metadata:
          name: test-imagemodestatusreporting
        spec:
          node:
            name: test-imagemodestatusreporting
          pool:
            name: worker
          configVersion:
            desired: rendered-worker-abc
          configImage: 
            desiredImage:
      expectedError: "spec.configImage.desiredImage: Required value, <nil>: Invalid value: \"null\""
  onUpdate:
    - name: status.configImage.desiredImage is required
      initial: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: MachineConfigNode
        metadata:
          name: test-imagemodestatusreporting
        spec:
          node:
            name: test-imagemodestatusreporting
          pool:
            name: worker
          configVersion:
            desired: rendered-worker-abc
          configImage: 
            desiredImage: image-registry.openshift-image-registry.svc:5000/openshift-machine-config-operator/os-images:latest
      updated: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: MachineConfigNode
