apiVersion: apiextensions.k8s.io/v1 # Hack because controller-gen complains if we don't have this
name: "Infrastructure"
crdName: infrastructures.config.openshift.io
featureGates:
- GCPDualStackInstall
tests:
  onCreate:
    - name: Should be able to create a minimal Infrastructure
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Infrastructure
        spec: {} # No spec is required for a Infrastructure
      expected: |
        apiVersion: config.openshift.io/v1
        kind: Infrastructure
        spec: {}
  onUpdate:
    - name: ipFamilies should default to `IPFamiliesIPv4` when not specified
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Infrastructure
        spec:
          platformSpec:
            gcp: {}
            type: GCP
        status:
          controlPlaneTopology: HighlyAvailable
          infrastructureTopology: HighlyAvailable
          platform: GCP
          platformStatus:
            gcp: {}
            type: GCP
      updated: |
        apiVersion: config.openshift.io/v1
        kind: Infrastructure
        spec:
          platformSpec:
            type: GCP
            gcp: {}
        status:
          controlPlaneTopology: HighlyAvailable
          infrastructureTopology: HighlyAvailable
          platform: GCP
          platformStatus:
            gcp: {}
            type: GCP
      expected: |
        apiVersion: config.openshift.io/v1
        kind: Infrastructure
        spec:
          platformSpec:
            type: GCP
            gcp: {}
        status:
          controlPlaneTopology: HighlyAvailable
          cpuPartitioning: None
          infrastructureTopology: HighlyAvailable
          platform: GCP
          platformStatus:
            gcp:
              ipFamilies: IPFamiliesIPv4
            type: GCP
    - name: should be able to set ipFamilies to non-default value of `IPFamiliesDualStack`
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Infrastructure
        spec:
          platformSpec:
            gcp: {}
            type: GCP
      updated: |
        apiVersion: config.openshift.io/v1
        kind: Infrastructure
        spec:
          platformSpec:
            type: GCP
            gcp: {}
        status:
          controlPlaneTopology: HighlyAvailable
          infrastructureTopology: HighlyAvailable
          platform: GCP
          platformStatus:
            gcp:
              ipFamilies: IPFamiliesDualStack
            type: GCP
      expected: |
        apiVersion: config.openshift.io/v1
        kind: Infrastructure
        spec:
          platformSpec:
            type: GCP
            gcp: {}
        status:
          controlPlaneTopology: HighlyAvailable
          cpuPartitioning: None
          infrastructureTopology: HighlyAvailable
          platform: GCP
          platformStatus:
            gcp:
              ipFamilies: IPFamiliesDualStack
            type: GCP
    - name: Should not allow changing the immutable ipFamilies field
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Infrastructure
        spec:
          platformSpec:
            gcp: {}
            type: GCP
        status:
          controlPlaneTopology: HighlyAvailable
          infrastructureTopology: HighlyAvailable
          platform: GCP
          platformStatus:
            gcp:
              ipFamilies: IPFamiliesDualStack
            type: GCP
      updated: |
        apiVersion: config.openshift.io/v1
        kind: Infrastructure
        spec:
          platformSpec:
            type: GCP
            gcp: {}
        status:
          controlPlaneTopology: HighlyAvailable
          infrastructureTopology: HighlyAvailable
          platform: GCP
          platformStatus:
            gcp:
              ipFamilies: IPFamiliesIPv4
            type: GCP
      expectedStatusError: "status.platformStatus.gcp.cloudLoadBalancerConfig.dnsType: Invalid value: \"string\": dnsType is immutable"
    - name: Should not accept random strings for IpFamilies
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Infrastructure
        spec:
          platformSpec:
            gcp: {}
            type: GCP
        status:
          controlPlaneTopology: HighlyAvailable
          infrastructureTopology: HighlyAvailable
          platform: GCP
          platformStatus:
            gcp:
              ipFamilies: IPFamiliesIPv4
            type: GCP
      updated: |
        apiVersion: config.openshift.io/v1
        kind: Infrastructure
        spec:
          platformSpec:
            type: GCP
            gcp: {}
        status:
          controlPlaneTopology: HighlyAvailable
          infrastructureTopology: HighlyAvailable
          platform: GCP
          platformStatus:
            gcp:
              ipFamilies: "OpenShift"
            type: GCP
      expectedStatusError: "status.platformStatus.gcp.ipFamilies: Invalid value: \"string\": value must be a valid IP address"
