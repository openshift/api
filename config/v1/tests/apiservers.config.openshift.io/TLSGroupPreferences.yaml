apiVersion: apiextensions.k8s.io/v1
name: "APIServer"
crdName: apiservers.config.openshift.io
featureGates:
  - TLSGroupPreferences
tests:
  onCreate:
    - name: Should be able to create with Custom TLS profile and groups
      initial: |
        apiVersion: config.openshift.io/v1
        kind: APIServer
        spec:
          tlsSecurityProfile:
            type: Custom
            custom:
              minTLSVersion: VersionTLS12
              ciphers:
                - TLS_AES_128_GCM_SHA256
                - TLS_AES_256_GCM_SHA384
              groups:
                - X25519
                - secp256r1
      expected: |
        apiVersion: config.openshift.io/v1
        kind: APIServer
        spec:
          audit:
            profile: Default
          tlsSecurityProfile:
            type: Custom
            custom:
              minTLSVersion: VersionTLS12
              ciphers:
                - TLS_AES_128_GCM_SHA256
                - TLS_AES_256_GCM_SHA384
              groups:
                - X25519
                - secp256r1
    - name: Should be able to create with all supported groups
      initial: |
        apiVersion: config.openshift.io/v1
        kind: APIServer
        spec:
          tlsSecurityProfile:
            type: Custom
            custom:
              minTLSVersion: VersionTLS12
              ciphers:
                - TLS_AES_128_GCM_SHA256
              groups:
                - X25519
                - secp256r1
                - secp384r1
                - secp521r1
                - X25519MLKEM768
                - SecP256r1MLKEM768
                - SecP384r1MLKEM1024
      expected: |
        apiVersion: config.openshift.io/v1
        kind: APIServer
        spec:
          audit:
            profile: Default
          tlsSecurityProfile:
            type: Custom
            custom:
              minTLSVersion: VersionTLS12
              ciphers:
                - TLS_AES_128_GCM_SHA256
              groups:
                - X25519
                - secp256r1
                - secp384r1
                - secp521r1
                - X25519MLKEM768
                - SecP256r1MLKEM768
                - SecP384r1MLKEM1024
    - name: Should fail to create with Custom TLS profile and empty curves
      initial: |
        apiVersion: config.openshift.io/v1
        kind: APIServer
        spec:
          tlsSecurityProfile:
            type: Custom
            custom:
              minTLSVersion: VersionTLS12
              ciphers:
                - TLS_AES_128_GCM_SHA256
              groups: []
      expectedError: "spec.tlsSecurityProfile.custom.groups in body should have at least 1 items"
    - name: Should be able to create with Custom TLS profile and groups omitted
      initial: |
        apiVersion: config.openshift.io/v1
        kind: APIServer
        spec:
          tlsSecurityProfile:
            type: Custom
            custom:
              minTLSVersion: VersionTLS12
              ciphers:
                - TLS_AES_128_GCM_SHA256
      expected: |
        apiVersion: config.openshift.io/v1
        kind: APIServer
        spec:
          audit:
            profile: Default
          tlsSecurityProfile:
            type: Custom
            custom:
              minTLSVersion: VersionTLS12
              ciphers:
                - TLS_AES_128_GCM_SHA256
    - name: Should be able to create with Custom TLS profile VersionTLS10 and groups
      initial: |
        apiVersion: config.openshift.io/v1
        kind: APIServer
        spec:
          tlsSecurityProfile:
            type: Custom
            custom:
              minTLSVersion: VersionTLS10
              ciphers:
                - TLS_AES_128_GCM_SHA256
              groups:
                - secp256r1
                - secp384r1
      expected: |
        apiVersion: config.openshift.io/v1
        kind: APIServer
        spec:
          audit:
            profile: Default
          tlsSecurityProfile:
            type: Custom
            custom:
              minTLSVersion: VersionTLS10
              ciphers:
                - TLS_AES_128_GCM_SHA256
              groups:
                - secp256r1
                - secp384r1
    - name: Should be able to create with Custom TLS profile VersionTLS11 and groups
      initial: |
        apiVersion: config.openshift.io/v1
        kind: APIServer
        spec:
          tlsSecurityProfile:
            type: Custom
            custom:
              minTLSVersion: VersionTLS11
              ciphers:
                - TLS_AES_128_GCM_SHA256
              groups:
                - secp384r1
      expected: |
        apiVersion: config.openshift.io/v1
        kind: APIServer
        spec:
          audit:
            profile: Default
          tlsSecurityProfile:
            type: Custom
            custom:
              minTLSVersion: VersionTLS11
              ciphers:
                - TLS_AES_128_GCM_SHA256
              groups:
                - secp384r1
    - name: Should fail to create with more than 7 groups
      initial: |
        apiVersion: config.openshift.io/v1
        kind: APIServer
        spec:
          tlsSecurityProfile:
            type: Custom
            custom:
              minTLSVersion: VersionTLS12
              ciphers:
                - TLS_AES_128_GCM_SHA256
              groups:
                - X25519
                - secp256r1
                - secp384r1
                - secp521r1
                - X25519MLKEM768
                - SecP256r1MLKEM768
                - SecP384r1MLKEM1024
                - X25519
      expectedError: "spec.tlsSecurityProfile.custom.groups: Too many: 8: must have at most 7 items"
    - name: Should fail to create with duplicate groups
      initial: |
        apiVersion: config.openshift.io/v1
        kind: APIServer
        spec:
          tlsSecurityProfile:
            type: Custom
            custom:
              minTLSVersion: VersionTLS12
              ciphers:
                - TLS_AES_128_GCM_SHA256
              groups:
                - X25519
                - secp256r1
                - X25519
      expectedError: "groups cannot contain duplicates"
    - name: Should fail to create with invalid group value
      initial: |
        apiVersion: config.openshift.io/v1
        kind: APIServer
        spec:
          tlsSecurityProfile:
            type: Custom
            custom:
              minTLSVersion: VersionTLS12
              ciphers:
                - TLS_AES_128_GCM_SHA256
              groups:
                - InvalidCurve
      expectedError: "spec.tlsSecurityProfile.custom.groups[0]: Unsupported value: \"InvalidCurve\": supported values: \"X25519\", \"secp256r1\", \"secp384r1\", \"secp521r1\", \"X25519MLKEM768\", \"SecP256r1MLKEM768\", \"SecP384r1MLKEM1024\""
  onUpdate:
    - name: Should be able to add groups to existing Custom TLS profile
      initial: |
        apiVersion: config.openshift.io/v1
        kind: APIServer
        spec:
          tlsSecurityProfile:
            type: Custom
            custom:
              minTLSVersion: VersionTLS12
              ciphers:
                - TLS_AES_128_GCM_SHA256
      updated: |
        apiVersion: config.openshift.io/v1
        kind: APIServer
        spec:
          audit:
            profile: Default
          tlsSecurityProfile:
            type: Custom
            custom:
              minTLSVersion: VersionTLS12
              ciphers:
                - TLS_AES_128_GCM_SHA256
              groups:
                - X25519
                - secp256r1
      expected: |
        apiVersion: config.openshift.io/v1
        kind: APIServer
        spec:
          audit:
            profile: Default
          tlsSecurityProfile:
            type: Custom
            custom:
              minTLSVersion: VersionTLS12
              ciphers:
                - TLS_AES_128_GCM_SHA256
              groups:
                - X25519
                - secp256r1
    - name: Should be able to update groups in existing Custom TLS profile
      initial: |
        apiVersion: config.openshift.io/v1
        kind: APIServer
        spec:
          tlsSecurityProfile:
            type: Custom
            custom:
              minTLSVersion: VersionTLS12
              ciphers:
                - TLS_AES_128_GCM_SHA256
              groups:
                - X25519
      updated: |
        apiVersion: config.openshift.io/v1
        kind: APIServer
        spec:
          audit:
            profile: Default
          tlsSecurityProfile:
            type: Custom
            custom:
              minTLSVersion: VersionTLS12
              ciphers:
                - TLS_AES_128_GCM_SHA256
              groups:
                - secp256r1
                - secp384r1
      expected: |
        apiVersion: config.openshift.io/v1
        kind: APIServer
        spec:
          audit:
            profile: Default
          tlsSecurityProfile:
            type: Custom
            custom:
              minTLSVersion: VersionTLS12
              ciphers:
                - TLS_AES_128_GCM_SHA256
              groups:
                - secp256r1
                - secp384r1
    - name: Should be able to remove groups field from existing Custom TLS profile
      initial: |
        apiVersion: config.openshift.io/v1
        kind: APIServer
        spec:
          tlsSecurityProfile:
            type: Custom
            custom:
              minTLSVersion: VersionTLS12
              ciphers:
                - TLS_AES_128_GCM_SHA256
              groups:
                - X25519
                - secp256r1
      updated: |
        apiVersion: config.openshift.io/v1
        kind: APIServer
        spec:
          audit:
            profile: Default
          tlsSecurityProfile:
            type: Custom
            custom:
              minTLSVersion: VersionTLS12
              ciphers:
                - TLS_AES_128_GCM_SHA256
      expected: |
        apiVersion: config.openshift.io/v1
        kind: APIServer
        spec:
          audit:
            profile: Default
          tlsSecurityProfile:
            type: Custom
            custom:
              minTLSVersion: VersionTLS12
              ciphers:
                - TLS_AES_128_GCM_SHA256
    - name: Should fail to remove all groups from existing Custom TLS profile
      initial: |
        apiVersion: config.openshift.io/v1
        kind: APIServer
        spec:
          tlsSecurityProfile:
            type: Custom
            custom:
              minTLSVersion: VersionTLS12
              ciphers:
                - TLS_AES_128_GCM_SHA256
              groups:
                - X25519
                - secp256r1
      updated: |
        apiVersion: config.openshift.io/v1
        kind: APIServer
        spec:
          audit:
            profile: Default
          tlsSecurityProfile:
            type: Custom
            custom:
              minTLSVersion: VersionTLS12
              ciphers:
                - TLS_AES_128_GCM_SHA256
              groups: []
      expectedError: "spec.tlsSecurityProfile.custom.groups in body should have at least 1 items"
