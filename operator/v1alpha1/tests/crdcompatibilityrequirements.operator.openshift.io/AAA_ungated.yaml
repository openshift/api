              spec:
                group: example.com
                names:
                  kind: TestRequirement
                  plural: testrequirements
                scope: Namespaced
                versions:
                - name: v1
                  served: true
                  storage: true
                  schema:
                    openAPIV3Schema:
                      type: object
          requiredVersions:
            defaultSet: StorageOnly
        customResourceDefinitionSchemaValidation:
