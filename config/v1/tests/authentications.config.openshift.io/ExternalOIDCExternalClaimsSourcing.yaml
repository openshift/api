                  tls:
                    certificateAuthority:
                      name: my-ca-secret
              url:
                hostname: graph.example.com
                pathExpression: "['v1.0', 'me']"
              mappings:
              - name: display_name
                expression: "response.displayName"
      expected: |
        apiVersion: config.openshift.io/v1
        kind: Authentication
        spec:
          type: OIDC
          oidcProviders:
          - name: myoidc
            issuer:
              issuerURL: https://meh.tld
              audiences: ['openshift-aud']
            claimMappings:
              username:
                claim: "preferred_username"
            externalClaimsSources:
            - authentication:
                type: ClientCredential
                clientCredential:
                  clientID: my-client-id
                  clientSecret:
                    name: my-client-secret
                  tokenEndpoint: https://auth.example.com/oauth2/token
                  tls:
                    certificateAuthority:
                      name: my-ca-secret
              url:
                hostname: graph.example.com
                pathExpression: "['v1.0', 'me']"
              mappings:
              - name: display_name
                expression: "response.displayName"
    - name: Can set externalClaimsSources with predicates
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Authentication
        spec:
          type: OIDC
          oidcProviders:
          - name: myoidc
            issuer:
              issuerURL: https://meh.tld
              audiences: ['openshift-aud']
            claimMappings:
              username:
                claim: "preferred_username"
            externalClaimsSources:
            - url:
                hostname: userinfo.example.com
                pathExpression: "['userinfo']"
              mappings:
              - name: email
                expression: "response.email"
              predicates:
              - expression: "claims.iss == 'https://meh.tld'"
      expected: |
        apiVersion: config.openshift.io/v1
        kind: Authentication
        spec:
          type: OIDC
          oidcProviders:
          - name: myoidc
            issuer:
              issuerURL: https://meh.tld
              audiences: ['openshift-aud']
            claimMappings:
              username:
                claim: "preferred_username"
            externalClaimsSources:
            - url:
                hostname: userinfo.example.com
                pathExpression: "['userinfo']"
              mappings:
              - name: email
                expression: "response.email"
              predicates:
              - expression: "claims.iss == 'https://meh.tld'"
    - name: Can set externalClaimsSources with top-level TLS
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Authentication
        spec:
          type: OIDC
          oidcProviders:
          - name: myoidc
            issuer:
              issuerURL: https://meh.tld
              audiences: ['openshift-aud']
            claimMappings:
              username:
                claim: "preferred_username"
            externalClaimsSources:
            - url:
                hostname: userinfo.example.com
                pathExpression: "['userinfo']"
              mappings:
              - name: email
                expression: "response.email"
              tls:
                certificateAuthority:
                  name: external-ca-secret
      expected: |
        apiVersion: config.openshift.io/v1
        kind: Authentication
        spec:
          type: OIDC
          oidcProviders:
          - name: myoidc
            issuer:
              issuerURL: https://meh.tld
