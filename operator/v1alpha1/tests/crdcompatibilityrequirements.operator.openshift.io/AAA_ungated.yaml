apiVersion: apiextensions.k8s.io/v1 # Hack because controller-gen complains if we don't have this
name: "CRDCompatibilityRequirement"
crdName: crdcompatibilityrequirements.operator.openshift.io
tests:
  onCreate:
  - name: Should be able to create a minimal CRDCompatibilityRequirement
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: CRDCompatibilityRequirement
      metadata:
        name: test-requirement
      spec:
        compatibilitySchema:
          customResourceDefinition:
            type: YAML
            data: |
              apiVersion: apiextensions.k8s.io/v1
              kind: CustomResourceDefinition
              metadata:
                name: testrequirements.example.com
              spec:
                group: example.com
                names:
                  kind: TestRequirement
                  plural: testrequirements
                scope: Namespaced
                versions:
                - name: v1
                  served: true
                  storage: true
                  schema:
                    openAPIV3Schema:
                      type: object
                      properties:
                        spec:
                          type: object
          requiredVersions:
            defaultSet: StorageOnly
    expected: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: CRDCompatibilityRequirement
      metadata:
        name: test-requirement
      spec:
        compatibilitySchema:
          customResourceDefinition:
            type: YAML
            data: |
              apiVersion: apiextensions.k8s.io/v1
              kind: CustomResourceDefinition
              metadata:
                name: testrequirements.example.com
              spec:
                group: example.com
                names:
                  kind: TestRequirement
                  plural: testrequirements
                scope: Namespaced
                versions:
                - name: v1
                  served: true
                  storage: true
                  schema:
                    openAPIV3Schema:
                      type: object
                      properties:
                        spec:
                          type: object
          requiredVersions:
            defaultSet: StorageOnly
  - name: Should not be able to create CRDCompatibilityRequirement without spec
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: CRDCompatibilityRequirement
      metadata:
        name: test-requirement
    expectedError: "is invalid: [spec: Required value"
  - name: Should not be able to create CRDCompatibilityRequirement without compatibilitySchema
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: CRDCompatibilityRequirement
      metadata:
        name: test-requirement
      spec: {}
    expectedError: "is invalid: [spec.compatibilitySchema: Required value"
  - name: Should not be able to create CRDCompatibilityRequirement without customResourceDefinition
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: CRDCompatibilityRequirement
      metadata:
        name: test-requirement
      spec:
        compatibilitySchema:
          requiredVersions:
            defaultSet: StorageOnly
    expectedError: "is invalid: [spec.compatibilitySchema.customResourceDefinition: Required value"
  - name: Should not be able to create CRDCompatibilityRequirement without requiredVersions
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: CRDCompatibilityRequirement
      metadata:
        name: test-requirement
      spec:
        compatibilitySchema:
          customResourceDefinition:
            type: YAML
            data: |
              apiVersion: apiextensions.k8s.io/v1
              kind: CustomResourceDefinition
              metadata:
                name: testrequirements.example.com
              spec:
                group: example.com
                names:
                  kind: TestRequirement
                  plural: testrequirements
                scope: Namespaced
                versions:
                - name: v1
                  served: true
                  storage: true
                  schema:
                    openAPIV3Schema:
                      type: object
    expectedError: "is invalid: [spec.compatibilitySchema.requiredVersions: Required value"
  - name: Should not be able to create CRDCompatibilityRequirement without CRD type
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: CRDCompatibilityRequirement
      metadata:
        name: test-requirement
      spec:
        compatibilitySchema:
          customResourceDefinition:
            data: |
              apiVersion: apiextensions.k8s.io/v1
              kind: CustomResourceDefinition
              metadata:
                name: testrequirements.example.com
              spec:
                group: example.com
                names:
                  kind: TestRequirement
                  plural: testrequirements
                scope: Namespaced
                versions:
                - name: v1
                  served: true
                  storage: true
                  schema:
                    openAPIV3Schema:
                      type: object
          requiredVersions:
            defaultSet: StorageOnly
    expectedError: "is invalid: [spec.compatibilitySchema.customResourceDefinition.type: Required value"
  - name: Should not be able to create CRDCompatibilityRequirement without CRD data
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: CRDCompatibilityRequirement
      metadata:
        name: test-requirement
      spec:
        compatibilitySchema:
          customResourceDefinition:
            type: YAML
          requiredVersions:
            defaultSet: StorageOnly
    expectedError: "is invalid: [spec.compatibilitySchema.customResourceDefinition.data: Required value"
  - name: Should not be able to create CRDCompatibilityRequirement without defaultSet
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: CRDCompatibilityRequirement
      metadata:
        name: test-requirement
