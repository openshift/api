apiVersion: apiextensions.k8s.io/v1 # Hack because controller-gen complains if we don't have this
name: "APIServer"
crdName: apiservers.config.openshift.io
featureGates:
- KMSEncryption
tests:
  onCreate:
    - name: Should reject KMS encryption type without kms config
      initial: |
        apiVersion: config.openshift.io/v1
        kind: APIServer
        spec:
          encryption:
            type: KMS
      expectedError: "kms config is required when encryption type is KMS"
    - name: Should be able to create with aescbc encryption
      initial: |
        apiVersion: config.openshift.io/v1
        kind: APIServer
        spec:
          encryption:
            type: aescbc
      expected: |
        apiVersion: config.openshift.io/v1
        kind: APIServer
        spec:
          audit:
            profile: Default
          encryption:
            type: aescbc
    - name: Should be able to create with aesgcm encryption
      initial: |
        apiVersion: config.openshift.io/v1
        kind: APIServer
        spec:
          encryption:
            type: aesgcm
      expected: |
        apiVersion: config.openshift.io/v1
        kind: APIServer
        spec:
          audit:
            profile: Default
          encryption:
            type: aesgcm
    - name: Should be able to create with identity encryption
      initial: |
        apiVersion: config.openshift.io/v1
        kind: APIServer
        spec:
          encryption:
            type: identity
      expected: |
        apiVersion: config.openshift.io/v1
        kind: APIServer
        spec:
          audit:
            profile: Default
          encryption:
            type: identity

    - name: Should reject kms config when encryption type is not KMS
      initial: |
        apiVersion: config.openshift.io/v1
        kind: APIServer
        spec:
          encryption:
            type: aescbc
            kms:
              type: Vault
              vault:
                kmsPluginImage: registry.example.com/vault-plugin@sha256:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
                vaultAddress: https://vault.example.com:8200
                authentication:
                  type: AppRole
                  appRole:
                    secret:
                      name: vault-approle
                transitKey: my-key
      expectedError: "kms config is required when encryption type is KMS, and forbidden otherwise"
