apiVersion: apiextensions.k8s.io/v1 # Hack because controller-gen complains if we don't have this
name: "[TechPreview] InsightsDataGather"
crdName: insightsdatagathers.config.openshift.io
featureGates:
  - InsightsConfig
tests:
  onCreate:
    - name: Should be able to create a minimal InsightsDataGather
      initial: |
        apiVersion: config.openshift.io/v1alpha1
        kind: InsightsDataGather
        spec: {} # No spec is required for a InsightsDataGather
      expected: |
        apiVersion: config.openshift.io/v1alpha1
        kind: InsightsDataGather
        spec: {}
    - name: Should be able to create InsightsDataGather with a storageSpec
      initial: |
        apiVersion: config.openshift.io/v1alpha1
        kind: InsightsDataGather
        spec:
          gatherConfig:
            dataPolicy: None
            storageSpec:
              type: PersistentVolumeClaim
              persistentVolume:
                persistentVolumeClaim:
                  name: test-claim
                  mountPath: /data
      expected: |
        apiVersion: config.openshift.io/v1alpha1
        kind: InsightsDataGather
        spec:
          gatherConfig:
            dataPolicy: None
            storageSpec:
              type: PersistentVolumeClaim
              persistentVolume:
                persistentVolumeClaim:
                  name: test-claim
                  mountPath: /data
    - name: mountPath must not contain colon
      initial: |
        apiVersion: config.openshift.io/v1alpha1
        kind: InsightsDataGather
        spec:
          gatherConfig:
            storageSpec:
              type: PersistentVolumeClaim
              persistentVolume:
                persistentVolumeClaim:
                  name: test-claim
                  mountPath: /data:/data
      expectedError: 'spec.gatherConfig.storageSpec.persistentVolume.persistentVolumeClaim.mountPath: Invalid value: "string": mountPath must not contain a colon'
    - name: storageSpec.PersistenVolumeClaim must name
      initial: |
        apiVersion: config.openshift.io/v1alpha1
        kind: InsightsDataGather
        spec:
          gatherConfig:
            storageSpec:
              type: PersistentVolumeClaim
              persistentVolume:
                persistentVolumeClaim:
                  mountPath: /data
      expectedError: "spec.gatherConfig.storageSpec.persistentVolume.persistentVolumeClaim.name: Required value"
    - name: persistentVolumeClaim must follow the naming convention
      initial: |
        apiVersion: config.openshift.io/v1alpha1
        kind: InsightsDataGather
        spec:
          gatherConfig:
            storageSpec:
              type: PersistentVolumeClaim
              persistentVolume:
                persistentVolumeClaim:
                  name: INVALID_PVC_NAME
      expectedError: 'Invalid value: "string": a lowercase RFC 1123 subdomain must consist of lower case alphanumeric characters, ''-'' or ''.'', and must start and end with an alphanumeric character.'
