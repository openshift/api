                  storage: true
                  schema:
                    openAPIV3Schema:
                      type: object
          requiredVersions: {}
    expectedError: "is invalid: [spec.compatibilitySchema.requiredVersions.defaultSet: Required value"
  - name: Should not be able to create CRDCompatibilityRequirement with invalid CRD type
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: CRDCompatibilityRequirement
      metadata:
        name: test-requirement
      spec:
        compatibilitySchema:
          customResourceDefinition:
            type: JSON
            data: |
              apiVersion: apiextensions.k8s.io/v1
              kind: CustomResourceDefinition
              metadata:
                name: testrequirements.example.com
              spec:
                group: example.com
                names:
                  kind: TestRequirement
                  plural: testrequirements
                scope: Namespaced
                versions:
                - name: v1
                  served: true
                  storage: true
                  schema:
                    openAPIV3Schema:
                      type: object
          requiredVersions:
            defaultSet: StorageOnly
    expectedError: "spec.compatibilitySchema.customResourceDefinition.type: Unsupported value: \"JSON\": supported values: \"YAML\""
  - name: Should not be able to create CRDCompatibilityRequirement with invalid defaultSet
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: CRDCompatibilityRequirement
      metadata:
        name: test-requirement
      spec:
        compatibilitySchema:
          customResourceDefinition:
            type: YAML
            data: |
              apiVersion: apiextensions.k8s.io/v1
              kind: CustomResourceDefinition
              metadata:
                name: testrequirements.example.com
              spec:
                group: example.com
                names:
                  kind: TestRequirement
                  plural: testrequirements
                scope: Namespaced
                versions:
                - name: v1
                  served: true
                  storage: true
                  schema:
                    openAPIV3Schema:
                      type: object
          requiredVersions:
            defaultSet: AllVersions
    expectedError: "spec.compatibilitySchema.requiredVersions.defaultSet: Unsupported value: \"AllVersions\": supported values: \"StorageOnly\", \"All\""
  - name: Should be able to create CRDCompatibilityRequirement with All defaultSet
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: CRDCompatibilityRequirement
      metadata:
        name: test-requirement
      spec:
        compatibilitySchema:
          customResourceDefinition:
            type: YAML
            data: |
              apiVersion: apiextensions.k8s.io/v1
              kind: CustomResourceDefinition
              metadata:
                name: testrequirements.example.com
              spec:
                group: example.com
                names:
                  kind: TestRequirement
                  plural: testrequirements
                scope: Namespaced
                versions:
                - name: v1
                  served: true
                  storage: true
                  schema:
                    openAPIV3Schema:
                      type: object
          requiredVersions:
            defaultSet: All
    expected: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: CRDCompatibilityRequirement
      metadata:
        name: test-requirement
      spec:
        compatibilitySchema:
          customResourceDefinition:
            type: YAML
            data: |
              apiVersion: apiextensions.k8s.io/v1
              kind: CustomResourceDefinition
              metadata:
                name: testrequirements.example.com
              spec:
                group: example.com
                names:
                  kind: TestRequirement
                  plural: testrequirements
                scope: Namespaced
                versions:
                - name: v1
                  served: true
                  storage: true
                  schema:
                    openAPIV3Schema:
                      type: object
          requiredVersions:
            defaultSet: All
  - name: Should not be able to create CRDCompatibilityRequirement with invalid CRD action
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: CRDCompatibilityRequirement
      metadata:
        name: test-requirement
      spec:
        compatibilitySchema:
          customResourceDefinition:
            type: YAML
            data: |
              apiVersion: apiextensions.k8s.io/v1
              kind: CustomResourceDefinition
              metadata:
                name: testrequirements.example.com
              spec:
                group: example.com
                names:
                  kind: TestRequirement
                  plural: testrequirements
                scope: Namespaced
                versions:
                - name: v1
                  served: true
                  storage: true
                  schema:
                    openAPIV3Schema:
                      type: object
          requiredVersions:
            defaultSet: StorageOnly
        customResourceDefinitionSchemaValidation:
          action: Block
    expectedError: "spec.customResourceDefinitionSchemaValidation.action: Unsupported value: \"Block\": supported values: \"Deny\", \"Warn\""
  - name: Should be able to create CRDCompatibilityRequirement with Deny action
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: CRDCompatibilityRequirement
      metadata:
