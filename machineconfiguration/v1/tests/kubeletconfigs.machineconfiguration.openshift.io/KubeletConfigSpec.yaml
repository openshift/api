apiVersion: apiextensions.k8s.io/v1 # Hack because controller-gen complains if we don't have this
name: "KubeletConfig"
crdName: kubeletconfigs.machineconfiguration.openshift.io
tests:
  onCreate:
    # AutoSizingReserved tests
    - name: Should be able to set autoSizingReserved to true
      initial: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec:
          autoSizingReserved: true
      expected: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec:
          autoSizingReserved: true
    - name: Should be able to set autoSizingReserved to false
      initial: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec:
          autoSizingReserved: false
      expected: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec:
          autoSizingReserved: false
    - name: Should be able to omit autoSizingReserved
      initial: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec: {}
      expected: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec: {}

    # LogLevel tests
    - name: Should be able to set logLevel to 4
      initial: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec:
          logLevel: 4
      expected: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec:
          logLevel: 4
    - name: Should be able to omit logLevel
      initial: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec: {}
      expected: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec: {}
    - name: Should be able to set logLevel to 0
      initial: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec:
          logLevel: 0
      expected: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec:
          logLevel: 0
    - name: Should be able to set logLevel to 10
      initial: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec:
          logLevel: 10
      expected: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec:
          logLevel: 10
    - name: Should reject logLevel less than 0
      initial: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec:
          logLevel: -1
      expectedError: "Invalid value"
    - name: Should reject logLevel greater than 10
      initial: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec:
          logLevel: 11
      expectedError: "Invalid value"

    # MachineConfigPoolSelector tests
    - name: Should be able to set machineConfigPoolSelector for worker pool
      initial: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec:
          machineConfigPoolSelector:
            matchLabels:
              pools.operator.machineconfiguration.openshift.io/worker: ""
      expected: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec:
          machineConfigPoolSelector:
            matchLabels:
              pools.operator.machineconfiguration.openshift.io/worker: ""
    - name: Should be able to set machineConfigPoolSelector for master pool
      initial: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec:
          machineConfigPoolSelector:
            matchLabels:
              pools.operator.machineconfiguration.openshift.io/master: ""
      expected: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec:
          machineConfigPoolSelector:
            matchLabels:
              pools.operator.machineconfiguration.openshift.io/master: ""
    - name: Should be able to omit machineConfigPoolSelector
      initial: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec: {}
      expected: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec: {}

    # KubeletConfig tests
    - name: Should be able to set kubeletConfig with maxPods
      initial: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec:
          kubeletConfig:
            maxPods: 250
      expected: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec:
          kubeletConfig:
            maxPods: 250
    - name: Should be able to omit kubeletConfig
      initial: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec: {}
      expected: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec: {}

    # TLSSecurityProfile tests
    - name: Should be able to set tlsSecurityProfile to Old
      initial: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec:
          tlsSecurityProfile:
            type: Old
      expected: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec:
          tlsSecurityProfile:
            type: Old
    - name: Should be able to set tlsSecurityProfile to Intermediate
      initial: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec:
          tlsSecurityProfile:
            type: Intermediate
      expected: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec:
          tlsSecurityProfile:
            type: Intermediate
    - name: Should reject tlsSecurityProfile with Modern type
      initial: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec:
          tlsSecurityProfile:
            type: Modern
      expectedError: "only Old and Intermediate TLS profiles are supported for kubelet"
    - name: Should reject tlsSecurityProfile with Custom type
      initial: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec:
          tlsSecurityProfile:
            type: Custom
            custom:
              ciphers:
                - ECDHE-ECDSA-AES128-GCM-SHA256
              minTLSVersion: VersionTLS12
      expectedError: "only Old and Intermediate TLS profiles are supported for kubelet"
    - name: Should reject tlsSecurityProfile without type field
      initial: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec:
          tlsSecurityProfile:
            custom:
              ciphers:
                - ECDHE-ECDSA-AES128-GCM-SHA256
              minTLSVersion: VersionTLS12
      expectedError: "only Old and Intermediate TLS profiles are supported for kubelet"
    - name: Should be able to omit tlsSecurityProfile
      initial: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec: {}
      expected: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec: {}

    # Combined fields tests
    - name: Should be able to set multiple fields together
      initial: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec:
          autoSizingReserved: true
          logLevel: 2
          machineConfigPoolSelector:
            matchLabels:
              pools.operator.machineconfiguration.openshift.io/worker: ""
          kubeletConfig:
            maxPods: 250
      expected: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec:
          autoSizingReserved: true
          logLevel: 2
          machineConfigPoolSelector:
            matchLabels:
              pools.operator.machineconfiguration.openshift.io/worker: ""
          kubeletConfig:
            maxPods: 250

  onUpdate:
    # AutoSizingReserved update tests
    - name: Should be able to update autoSizingReserved from true to false
      initial: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec:
          autoSizingReserved: true
      updated: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec:
          autoSizingReserved: false
      expected: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec:
          autoSizingReserved: false

    # LogLevel update tests
    - name: Should be able to remove logLevel
      initial: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec:
          logLevel: 2
      updated: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec: {}
      expected: |
        apiVersion: machineconfiguration.openshift.io/v1
        kind: KubeletConfig
        spec: {}