        providerSpec:
          value:
            apiVersion: machine.openshift.io/v1beta1
            kind: GCPMachineProviderSpec
            machineType: n1-standard-4
            region: us-central1
            zone: us-central1-a
            networkInterfaces:
            - network: test-network
              subnetwork: test-subnet
              stackType: DualStack
              ipv6Address: "2001:db8::2"
    expected: |
      apiVersion: machine.openshift.io/v1beta1
      kind: Machine
      spec:
        authoritativeAPI: MachineAPI
        providerSpec:
          value:
            apiVersion: machine.openshift.io/v1beta1
            kind: GCPMachineProviderSpec
            machineType: n1-standard-4
            region: us-central1
            zone: us-central1-a
            networkInterfaces:
            - network: test-network
              subnetwork: test-subnet
