apiVersion: apiextensions.k8s.io/v1 # Hack because controller-gen complains if we don't have this
name: "Authentication"
crdName: authentications.config.openshift.io
featureGates:
- ExternalOIDCExternalClaimsSourcing
tests:
  onCreate:
    - name: Should be able to create a minimal Authentication
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Authentication
        spec: {} # No spec is required for a Authentication
      expected: |
        apiVersion: config.openshift.io/v1
        kind: Authentication
        spec: {}
    - name: Can set OIDC provider with minimal externalClaimsSources
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Authentication
        spec:
          type: OIDC
          oidcProviders:
          - name: myoidc
            issuer:
              issuerURL: https://meh.tld
              audiences: ['openshift-aud']
            claimMappings:
              username:
                claim: "preferred_username"
            externalClaimsSources:
            - url:
                hostname: userinfo.example.com
                pathExpression: "['userinfo']"
              mappings:
              - name: email
                expression: "response.email"
      expected: |
        apiVersion: config.openshift.io/v1
        kind: Authentication
        spec:
          type: OIDC
          oidcProviders:
          - name: myoidc
            issuer:
              issuerURL: https://meh.tld
              audiences: ['openshift-aud']
            claimMappings:
              username:
                claim: "preferred_username"
            externalClaimsSources:
            - url:
                hostname: userinfo.example.com
                pathExpression: "['userinfo']"
              mappings:
              - name: email
                expression: "response.email"
    - name: Can set externalClaimsSources with RequestProvidedToken authentication
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Authentication
        spec:
          type: OIDC
          oidcProviders:
          - name: myoidc
            issuer:
              issuerURL: https://meh.tld
              audiences: ['openshift-aud']
            claimMappings:
              username:
                claim: "preferred_username"
            externalClaimsSources:
            - authentication:
                type: RequestProvidedToken
              url:
                hostname: userinfo.example.com
                pathExpression: "['userinfo']"
              mappings:
              - name: email
                expression: "response.email"
      expected: |
        apiVersion: config.openshift.io/v1
        kind: Authentication
        spec:
          type: OIDC
          oidcProviders:
          - name: myoidc
            issuer:
              issuerURL: https://meh.tld
              audiences: ['openshift-aud']
            claimMappings:
              username:
                claim: "preferred_username"
            externalClaimsSources:
            - authentication:
                type: RequestProvidedToken
              url:
                hostname: userinfo.example.com
                pathExpression: "['userinfo']"
              mappings:
              - name: email
                expression: "response.email"
    - name: Can set externalClaimsSources with ClientCredential authentication
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Authentication
        spec:
          type: OIDC
          oidcProviders:
          - name: myoidc
            issuer:
              issuerURL: https://meh.tld
              audiences: ['openshift-aud']
            claimMappings:
              username:
                claim: "preferred_username"
            externalClaimsSources:
            - authentication:
                type: ClientCredential
                clientCredential:
                  clientID: my-client-id
                  clientSecret:
                    name: my-client-secret
                  tokenEndpoint: https://auth.example.com/oauth2/token
              url:
                hostname: graph.example.com
                pathExpression: "['v1.0', 'me']"
              mappings:
              - name: display_name
                expression: "response.displayName"
      expected: |
        apiVersion: config.openshift.io/v1
        kind: Authentication
        spec:
          type: OIDC
          oidcProviders:
          - name: myoidc
            issuer:
              issuerURL: https://meh.tld
              audiences: ['openshift-aud']
            claimMappings:
              username:
                claim: "preferred_username"
            externalClaimsSources:
            - authentication:
                type: ClientCredential
                clientCredential:
                  clientID: my-client-id
                  clientSecret:
                    name: my-client-secret
                  tokenEndpoint: https://auth.example.com/oauth2/token
              url:
                hostname: graph.example.com
                pathExpression: "['v1.0', 'me']"
              mappings:
              - name: display_name
                expression: "response.displayName"
    - name: Can set externalClaimsSources with ClientCredential authentication with scopes
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Authentication
        spec:
          type: OIDC
          oidcProviders:
          - name: myoidc
            issuer:
              issuerURL: https://meh.tld
              audiences: ['openshift-aud']
            claimMappings:
              username:
                claim: "preferred_username"
            externalClaimsSources:
            - authentication:
                type: ClientCredential
                clientCredential:
                  clientID: my-client-id
                  clientSecret:
                    name: my-client-secret
                  tokenEndpoint: https://auth.example.com/oauth2/token
                  scopes:
                  - openid
                  - profile
              url:
                hostname: graph.example.com
                pathExpression: "['v1.0', 'me']"
              mappings:
              - name: display_name
                expression: "response.displayName"
      expected: |
        apiVersion: config.openshift.io/v1
        kind: Authentication
        spec:
          type: OIDC
          oidcProviders:
          - name: myoidc
            issuer:
              issuerURL: https://meh.tld
              audiences: ['openshift-aud']
            claimMappings:
              username:
                claim: "preferred_username"
            externalClaimsSources:
            - authentication:
                type: ClientCredential
                clientCredential:
                  clientID: my-client-id
                  clientSecret:
                    name: my-client-secret
                  tokenEndpoint: https://auth.example.com/oauth2/token
                  scopes:
                  - openid
                  - profile
              url:
                hostname: graph.example.com
                pathExpression: "['v1.0', 'me']"
              mappings:
              - name: display_name
                expression: "response.displayName"
    - name: Can set externalClaimsSources with ClientCredential authentication with TLS
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Authentication
        spec:
          type: OIDC
          oidcProviders:
          - name: myoidc
            issuer:
              issuerURL: https://meh.tld
              audiences: ['openshift-aud']
            claimMappings:
