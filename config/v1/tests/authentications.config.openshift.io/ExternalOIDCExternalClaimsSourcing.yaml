        spec:
          type: OIDC
          oidcProviders:
          - name: myoidc
            issuer:
              issuerURL: https://meh.tld
              audiences: ['openshift-aud']
            claimMappings:
              username:
                claim: "preferred_username"
            externalClaimsSources:
            - url:
                hostname: userinfo.example.com:8443
                pathExpression: "['userinfo']"
              mappings:
              - name: email
                expression: "response.email"
    - name: Cannot set externalClaimsSources with missing clientCredential when type is ClientCredential
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Authentication
        spec:
          type: OIDC
          oidcProviders:
          - name: myoidc
            issuer:
              issuerURL: https://meh.tld
              audiences: ['openshift-aud']
            claimMappings:
              username:
                claim: "preferred_username"
            externalClaimsSources:
            - authentication:
                type: ClientCredential
              url:
                hostname: graph.example.com
                pathExpression: "['v1.0', 'me']"
              mappings:
              - name: display_name
                expression: "response.displayName"
      expectedError: "clientCredential is required when type is ClientCredential, and forbidden otherwise"
    - name: Cannot set externalClaimsSources with clientCredential when type is RequestProvidedToken
