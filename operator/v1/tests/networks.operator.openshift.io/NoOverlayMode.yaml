apiVersion: apiextensions.k8s.io/v1 # Hack because controller-gen complains if we don't have this
name: "Network"
crdName: networks.operator.openshift.io
featureGates:
- NoOverlayMode
tests:
  onCreate:
  - name: Should be able to create Network with Geneve transport (default)
    initial: |
      apiVersion: operator.openshift.io/v1
      kind: Network
      spec:
        defaultNetwork:
          ovnKubernetesConfig:
            defaultNetworkTransport: Geneve
    expected: |
      apiVersion: operator.openshift.io/v1
      kind: Network
      spec:
        disableNetworkDiagnostics: false
        logLevel: Normal
        operatorLogLevel: Normal
        defaultNetwork:
          ovnKubernetesConfig:
            defaultNetworkTransport: Geneve
            ipsecConfig:
              mode: Disabled
  - name: Should fail if NoOverlay transport is set without NoOverlayOptions
    initial: |
      apiVersion: operator.openshift.io/v1
      kind: Network
      spec:
        defaultNetwork:
          ovnKubernetesConfig:
            defaultNetworkTransport: NoOverlay
    expectedError: "defaultNetworkNoOverlayOptions is required when defaultNetworkTransport is NoOverlay"
  - name: Should be able to create Network with NoOverlay transport and Unmanaged routing
    initial: |
      apiVersion: operator.openshift.io/v1
      kind: Network
      spec:
        defaultNetwork:
          ovnKubernetesConfig:
            defaultNetworkTransport: NoOverlay
            defaultNetworkNoOverlayOptions:
              outboundSNAT: Disabled
              routing: Unmanaged
    expected: |
      apiVersion: operator.openshift.io/v1
      kind: Network
      spec:
        disableNetworkDiagnostics: false
        logLevel: Normal
        operatorLogLevel: Normal
        defaultNetwork:
          ovnKubernetesConfig:
            defaultNetworkTransport: NoOverlay
            defaultNetworkNoOverlayOptions:
              outboundSNAT: Disabled
              routing: Unmanaged
            ipsecConfig:
              mode: Disabled
  - name: Should fail if routing is Managed without BGPManagedConfig
    initial: |
      apiVersion: operator.openshift.io/v1
      kind: Network
      spec:
        defaultNetwork:
          ovnKubernetesConfig:
            defaultNetworkTransport: NoOverlay
            defaultNetworkNoOverlayOptions:
              outboundSNAT: Disabled
              routing: Managed
    expectedError: "bgpManagedConfig is required when defaultNetworkNoOverlayOptions.routing is Managed"
  - name: Should be able to create Network with NoOverlay transport and Managed routing with BGPManagedConfig
    initial: |
      apiVersion: operator.openshift.io/v1
      kind: Network
      spec:
        defaultNetwork:
          ovnKubernetesConfig:
            defaultNetworkTransport: NoOverlay
            defaultNetworkNoOverlayOptions:
              outboundSNAT: Disabled
              routing: Managed
            bgpManagedConfig:
              bgpTopology: FullMesh
    expected: |
      apiVersion: operator.openshift.io/v1
      kind: Network
      spec:
        disableNetworkDiagnostics: false
        logLevel: Normal
        operatorLogLevel: Normal
        defaultNetwork:
          ovnKubernetesConfig:
            defaultNetworkTransport: NoOverlay
            defaultNetworkNoOverlayOptions:
              outboundSNAT: Disabled
              routing: Managed
            bgpManagedConfig:
              asNumber: 64512
              bgpTopology: FullMesh
            ipsecConfig:
              mode: Disabled
  onUpdate:
  - name: Should not allow changing defaultNetworkTransport
    initial: |
      apiVersion: operator.openshift.io/v1
      kind: Network
      spec:
        defaultNetwork:
          ovnKubernetesConfig:
            defaultNetworkTransport: Geneve
    updated: |
      apiVersion: operator.openshift.io/v1
      kind: Network
      spec:
        defaultNetwork:
          ovnKubernetesConfig:
            defaultNetworkTransport: NoOverlay
            defaultNetworkNoOverlayOptions:
              outboundSNAT: Disabled
              routing: Unmanaged
    expectedError: "DefaultNetworkTransport field is immutable"
  - name: Should not allow changing defaultNetworkNoOverlayOptions
    initial: |
      apiVersion: operator.openshift.io/v1
      kind: Network
      spec:
        defaultNetwork:
          ovnKubernetesConfig:
            defaultNetworkTransport: NoOverlay
            defaultNetworkNoOverlayOptions:
              outboundSNAT: Disabled
              routing: Unmanaged
    updated: |
      apiVersion: operator.openshift.io/v1
      kind: Network
      spec:
        defaultNetwork:
          ovnKubernetesConfig:
            defaultNetworkTransport: NoOverlay
            defaultNetworkNoOverlayOptions:
              outboundSNAT: Enabled
              routing: Unmanaged
    expectedError: "defaultNetworkNoOverlayOptions field is immutable"
  - name: Should not allow changing bgpManagedConfig
    initial: |
      apiVersion: operator.openshift.io/v1
      kind: Network
      spec:
        defaultNetwork:
          ovnKubernetesConfig:
            defaultNetworkTransport: NoOverlay
            defaultNetworkNoOverlayOptions:
              outboundSNAT: Disabled
              routing: Managed
            bgpManagedConfig:
              bgpTopology: FullMesh
    updated: |
      apiVersion: operator.openshift.io/v1
      kind: Network
      spec:
        defaultNetwork:
          ovnKubernetesConfig:
            defaultNetworkTransport: NoOverlay
            defaultNetworkNoOverlayOptions:
              outboundSNAT: Disabled
              routing: Managed
            bgpManagedConfig:
              asNumber: 65000
              bgpTopology: FullMesh
    expectedError: "bgpManagedConfig field is immutable"
