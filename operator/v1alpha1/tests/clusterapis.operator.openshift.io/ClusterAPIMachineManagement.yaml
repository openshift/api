    # ManifestSubstitution key validation tests

    - name: Should accept valid envsubst key in manifestSubstitutions
      initial: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: ClusterAPI
        metadata:
          name: cluster
        spec: {}
      updated: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: ClusterAPI
        metadata:
          name: cluster
        spec: {}
        status:
          desiredRevision: rev-1
          revisions:
            - name: rev-1
              revision: 1
              contentID: content-1
              manifestSubstitutions:
                - key: EXP_BOOTSTRAP_FORMAT_IGNITION
                  value: "true"
              components:
                - type: Image
                  image:
                    ref: quay.io/openshift/cluster-api@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
                    profile: default
      expected: |
        apiVersion: operator.openshift.io/v1alpha1
        kind: ClusterAPI
        metadata:
          name: cluster
        spec: {}
        status:
          desiredRevision: rev-1
          revisions:
            - name: rev-1
