                  tokenEndpoint: https://auth.example.com/oauth2/token
              url:
                hostname: userinfo.example.com
                pathExpression: "['userinfo']"
              mappings:
              - name: email
                expression: "response.email"
      expectedError: "clientCredential is required when type is ClientCredential, and forbidden otherwise"
    - name: Cannot set tokenEndpoint that is not a valid URL
      initial: |
        apiVersion: config.openshift.io/v1
