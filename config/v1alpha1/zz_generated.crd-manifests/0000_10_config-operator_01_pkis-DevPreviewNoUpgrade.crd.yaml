apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    api-approved.openshift.io: https://github.com/openshift/api/pull/2645
    api.openshift.io/merged-by-featuregates: "true"
    include.release.openshift.io/ibm-cloud-managed: "true"
    include.release.openshift.io/self-managed-high-availability: "true"
    release.openshift.io/feature-set: DevPreviewNoUpgrade
  name: pkis.config.openshift.io
spec:
  group: config.openshift.io
  names:
    kind: PKI
    listKind: PKIList
    plural: pkis
    singular: pki
  scope: Cluster
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          PKI configures cryptographic parameters for certificates generated
          internally by OpenShift components.

          Compatibility level 4: No compatibility is provided, the API can change at any point for any reason. These capabilities should not be used by applications needing long term support.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec holds user settable values for configuration
            properties:
              certificateManagement:
                description: |-
                  certificateManagement specifies how PKI configuration is managed for internally-generated certificates.
                  This controls the certificate generation approach for all OpenShift components that create
                  certificates internally, including certificate authorities, serving certificates, and client certificates.
                properties:
                  custom:
                    description: |-
                      custom contains administrator-specified cryptographic configuration.
                      Use the defaults and categoryOverrides fields to specify certificate generation parameters.
                      Required when mode is Custom, and forbidden otherwise.
                    properties:
                      categoryOverrides:
                        description: |-
                          categoryOverrides allows overriding certificate parameters for specific
                          categories of certificates (SignerCertificate, ServingCertificate, ClientCertificate).
                          Category overrides take precedence over defaults.
                        items:
                          properties:
                            category:
                              description: |-
                                category identifies the certificate category.
                                Valid values are "SignerCertificate", "ServingCertificate", and "ClientCertificate".

                                When set to SignerCertificate, the configuration applies to certificate authority (CA) certificates
                                that sign other certificates.

                                When set to ServingCertificate, the configuration applies to TLS server certificates
                                used to serve HTTPS endpoints.

                                When set to ClientCertificate, the configuration applies to client authentication certificates
                                used to authenticate to servers.
                              enum:
                              - SignerCertificate
                              - ServingCertificate
                              - ClientCertificate
                              type: string
                            certificate:
                              description: certificate specifies the configuration
                                for this category
                              minProperties: 1
                              properties:
                                key:
                                  description: |-
                                    key specifies the cryptographic parameters for the certificate's key pair.
                                    Currently this is the only configurable parameter. When omitted in a
                                    categoryOverrides entry, the key configuration from defaults is used.
                                  properties:
                                    algorithm:
                                      description: |-
                                        algorithm specifies the key generation algorithm.
                                        Valid values are "RSA" and "ECDSA".
                                      enum:
                                      - RSA
                                      - ECDSA
                                      type: string
                                    ecdsa:
                                      description: |-
                                        ecdsa specifies ECDSA key parameters.
                                        Required when algorithm is ECDSA, and forbidden otherwise.
                                      properties:
                                        curve:
                                          description: |-
                                            curve specifies the elliptic curve for ECDSA keys.
                                            Valid values are "P256", "P384", and "P521".
                                          enum:
                                          - P256
                                          - P384
                                          - P521
                                          type: string
                                      required:
                                      - curve
                                      type: object
                                    rsa:
                                      description: |-
                                        rsa specifies RSA key parameters.
                                        Required when algorithm is RSA, and forbidden otherwise.
                                      properties:
                                        keySize:
                                          description: |-
                                            keySize specifies the size of RSA keys in bits.
                                            Valid values are multiples of 1024 from 2048 to 8192.
                                          format: int32
                                          maximum: 8192
                                          minimum: 2048
                                          multipleOf: 1024
                                          type: integer
                                      required:
                                      - keySize
                                      type: object
                                  required:
                                  - algorithm
                                  type: object
                                  x-kubernetes-validations:
                                  - message: rsa is required when algorithm is RSA,
                                      and forbidden otherwise
                                    rule: 'has(self.algorithm) && self.algorithm ==
                                      ''RSA'' ?  has(self.rsa) : !has(self.rsa)'
                                  - message: ecdsa is required when algorithm is ECDSA,
                                      and forbidden otherwise
                                    rule: 'has(self.algorithm) && self.algorithm ==
                                      ''ECDSA'' ?  has(self.ecdsa) : !has(self.ecdsa)'
                              type: object
                          required:
                          - category
                          - certificate
                          type: object
                        maxItems: 3
                        type: array
                        x-kubernetes-list-map-keys:
                        - category
                        x-kubernetes-list-type: map
                      defaults:
                        description: |-
                          defaults specifies the default certificate configuration that applies
                          to all certificates unless overridden by a categoryOverrides entry.
                        minProperties: 1
                        properties:
                          key:
                            description: |-
                              key specifies the cryptographic parameters for the certificate's key pair.
                              Currently this is the only configurable parameter. When omitted in a
                              categoryOverrides entry, the key configuration from defaults is used.
                            properties:
                              algorithm:
                                description: |-
                                  algorithm specifies the key generation algorithm.
                                  Valid values are "RSA" and "ECDSA".
                                enum:
                                - RSA
                                - ECDSA
                                type: string
                              ecdsa:
                                description: |-
                                  ecdsa specifies ECDSA key parameters.
                                  Required when algorithm is ECDSA, and forbidden otherwise.
                                properties:
                                  curve:
                                    description: |-
                                      curve specifies the elliptic curve for ECDSA keys.
                                      Valid values are "P256", "P384", and "P521".
                                    enum:
                                    - P256
                                    - P384
                                    - P521
                                    type: string
                                required:
                                - curve
                                type: object
                              rsa:
                                description: |-
                                  rsa specifies RSA key parameters.
                                  Required when algorithm is RSA, and forbidden otherwise.
                                properties:
                                  keySize:
                                    description: |-
                                      keySize specifies the size of RSA keys in bits.
                                      Valid values are multiples of 1024 from 2048 to 8192.
                                    format: int32
                                    maximum: 8192
                                    minimum: 2048
                                    multipleOf: 1024
                                    type: integer
                                required:
                                - keySize
                                type: object
                            required:
                            - algorithm
                            type: object
                            x-kubernetes-validations:
                            - message: rsa is required when algorithm is RSA, and
                                forbidden otherwise
                              rule: 'has(self.algorithm) && self.algorithm == ''RSA''
                                ?  has(self.rsa) : !has(self.rsa)'
                            - message: ecdsa is required when algorithm is ECDSA,
                                and forbidden otherwise
                              rule: 'has(self.algorithm) && self.algorithm == ''ECDSA''
                                ?  has(self.ecdsa) : !has(self.ecdsa)'
                        type: object
                    required:
                    - defaults
                    type: object
                    x-kubernetes-validations:
                    - fieldPath: defaults.key
                      message: the default key algorithm configuration is required
                      rule: has(self.defaults.key)
                  mode:
                    description: |-
                      mode determines how PKI configuration is managed.
                      Valid values are "Unmanaged", "Default", and "Custom".

                      When set to Unmanaged, components use their existing hardcoded certificate
                      generation behavior, exactly as if this feature did not exist. Each component
                      generates certificates using whatever parameters it was using before this
                      feature. While most components use RSA 2048, some may use different
                      parameters. Use of this mode might prevent upgrading to the next major
                      OpenShift release.

                      When set to Default, OpenShift-recommended best practices for certificate
                      generation are applied. The specific parameters may evolve across OpenShift
                      releases to adopt improved cryptographic standards. In the initial release,
                      this matches Unmanaged behavior for each component. In future releases, this
                      may adopt ECDSA or larger RSA keys based on industry best practices.
                      Recommended for most customers who want to benefit from security improvements
                      automatically.

                      When set to Custom, the certificate management parameters can be set
                      explicitly. Use the custom field to specify certificate generation parameters.
                    enum:
                    - Unmanaged
                    - Default
                    - Custom
                    type: string
                required:
                - mode
                type: object
                x-kubernetes-validations:
                - message: custom is required when mode is Custom, and forbidden otherwise
                  rule: 'self.mode == ''Custom'' ? has(self.custom) : !has(self.custom)'
            required:
            - certificateManagement
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
