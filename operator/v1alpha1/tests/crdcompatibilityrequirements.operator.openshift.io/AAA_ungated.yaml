                names:
                  kind: TestRequirement
                  plural: testrequirements
                scope: Namespaced
                versions:
                - name: v1
                  served: true
                  storage: true
                  schema:
                    openAPIV3Schema:
                      type: object
          requiredVersions:
            defaultSet: StorageOnly
        objectSchemaValidation:
          action: Warn
  - name: Should not be able to create CRDCompatibilityRequirement with empty CRD data
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: CRDCompatibilityRequirement
      metadata:
        name: test-requirement
      spec:
        compatibilitySchema:
          customResourceDefinition:
            type: YAML
            data: ""
          requiredVersions:
            defaultSet: StorageOnly
    expectedError: "spec.compatibilitySchema.customResourceDefinition.data in body should be at least 1 chars long"
  - name: Should be able to create CRDCompatibilityRequirement with additional API versions
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: CRDCompatibilityRequirement
      metadata:
