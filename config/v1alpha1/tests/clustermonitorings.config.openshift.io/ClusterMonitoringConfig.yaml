              - name: "hugepages-1Gi"
                request: "1Gi"
              - name: "ephemeral-storage"
                request: "1Gi"
              - name: "nvidia.com/gpu"
                request: "1"
      expectedError: 'spec.prometheusOperatorAdmissionWebhookConfig.resources: Too many: 6: must have at most 5 items'
    - name: Should reject PrometheusOperatorAdmissionWebhookConfig with limit less than request
      initial: |
        apiVersion: config.openshift.io/v1alpha1
        kind: ClusterMonitoring
