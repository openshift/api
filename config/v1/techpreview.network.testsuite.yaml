apiVersion: apiextensions.k8s.io/v1 # Hack because controller-gen complains if we don't have this
name: "[TechPreviewNoUpgrade] Network"
crd: 0000_10_config-operator_01_networks-TechPreviewNoUpgrade.crd.yaml
tests:
  onCreate:
    - name: Network diagnostics mode should default to `All`
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Network
        spec:
          networkDiagnostics: {}
      expected: |
        apiVersion: config.openshift.io/v1
        kind: Network
        spec:
          networkDiagnostics:
            mode: All
    - name: Should be able to set network diagnostics sourcePlacement and targetPlacement when mode is All
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Network
        spec:
          networkDiagnostics:
            mode: All
            sourcePlacement:
              nodeSelector:
                kubernetes.io/os: linux
                node-role.kubernetes.io/infra: ""
            targetPlacement:
              nodeSelector:
                kubernetes.io/os: linux
              tolerations:
                - operator: Exists
      expected: |
        apiVersion: config.openshift.io/v1
        kind: Network
        spec:
          networkDiagnostics:
            mode: All
            sourcePlacement:
              nodeSelector:
                kubernetes.io/os: linux
                node-role.kubernetes.io/infra: ""
            targetPlacement:
              nodeSelector:
                kubernetes.io/os: linux
              tolerations:
                - operator: Exists
    - name: Should not be able to set network diagnostics sourcePlacement and targetPlacement when mode is Disabled
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Network
        spec:
          networkDiagnostics:
            mode: Disabled
            sourcePlacement:
              nodeSelector:
                kubernetes.io/os: linux
                node-role.kubernetes.io/infra: ""
            targetPlacement:
              nodeSelector:
                kubernetes.io/os: linux
              tolerations:
                - operator: Exists
      expectedError: "cannot set networkDiagnostics.sourcePlacement and networkDiagnostics.targetPlacement when networkDiagnostics.mode is Disabled"
