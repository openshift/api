apiVersion: apiextensions.k8s.io/v1 # Hack because controller-gen complains if we don't have this
name: "Infrastructure"
crdName: infrastructures.config.openshift.io
featureGates:
- VSphereMultiVCenterDay2
tests:
  onCreate:
    - name: Should be able to create a minimal Infrastructure
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Infrastructure
        spec: {} # No spec is required for a Infrastructure
      expected: |
        apiVersion: config.openshift.io/v1
        kind: Infrastructure
        spec: {}
    - name: Should be able to create Infrastructure with vSphere platform and 1 vcenter
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Infrastructure
        spec:
          cloudConfig:
            key: config
            name: cloud-provider-config
          platformSpec:
            type: VSphere
            vsphere:
              vcenters:
              - datacenters:
                - IBMCloud
                port: 443
                server: vcenter1.example.com
              failureDomains:
              - name: fd1
                region: region1
                server: vcenter1.example.com
                topology:
                  computeCluster: /IBMCloud/host/cluster1
                  datacenter: IBMCloud
                  datastore: /IBMCloud/datastore/ds1
                  networks:
                  - network1
                  resourcePool: /IBMCloud/host/cluster1/Resources
                zone: zone1
      expected: |
        apiVersion: config.openshift.io/v1
        kind: Infrastructure
        spec:
          cloudConfig:
            key: config
            name: cloud-provider-config
          platformSpec:
            type: VSphere
            vsphere:
              vcenters:
              - datacenters:
                - IBMCloud
                port: 443
                server: vcenter1.example.com
              failureDomains:
              - name: fd1
                region: region1
                server: vcenter1.example.com
                topology:
                  computeCluster: /IBMCloud/host/cluster1
                  datacenter: IBMCloud
                  datastore: /IBMCloud/datastore/ds1
                  networks:
                  - network1
                  resourcePool: /IBMCloud/host/cluster1/Resources
                zone: zone1
