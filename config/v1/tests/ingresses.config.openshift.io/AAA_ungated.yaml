apiVersion: apiextensions.k8s.io/v1 # Hack because controller-gen complains if we don't have this
name: "Ingress"
crdName: ingresses.config.openshift.io
tests:
  onCreate:
    - name: Should be able to create a minimal Ingress
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Ingress
        spec: {} # No spec is required for a Ingress
      expected: |
        apiVersion: config.openshift.io/v1
        kind: Ingress
        spec: {}
    - name: Should be able to create an Ingress with domain set
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Ingress
        spec:
          domain: apps.example.com
      expected: |
        apiVersion: config.openshift.io/v1
        kind: Ingress
        spec:
          domain: apps.example.com
    - name: Should be able to create an Ingress with componentRoutes containing labels
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Ingress
        spec:
          domain: apps.example.com
          componentRoutes:
            - name: console
              namespace: openshift-console
              hostname: console.example.com
              labels:
                ingress: shard-console
      expected: |
        apiVersion: config.openshift.io/v1
        kind: Ingress
        spec:
          domain: apps.example.com
          componentRoutes:
            - name: console
              namespace: openshift-console
              hostname: console.example.com
              labels:
                ingress: shard-console
    - name: Should be able to create an Ingress with multiple componentRoutes with labels
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Ingress
        spec:
          domain: apps.example.com
          componentRoutes:
            - name: console-2
              namespace: openshift-console
              hostname: console.internal.corp.example.com
              labels:
                ingress: shard-console2
            - name: console-3
              namespace: openshift-console
              hostname: console.private.corp.example.com
              labels:
                ingress: shard-console3
      expected: |
        apiVersion: config.openshift.io/v1
        kind: Ingress
        spec:
          domain: apps.example.com
          componentRoutes:
            - name: console-2
              namespace: openshift-console
              hostname: console.internal.corp.example.com
              labels:
                ingress: shard-console2
            - name: console-3
              namespace: openshift-console
              hostname: console.private.corp.example.com
              labels:
                ingress: shard-console3
    - name: Should be able to create componentRoutes with empty labels map
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Ingress
        spec:
          domain: apps.example.com
          componentRoutes:
            - name: console
              namespace: openshift-console
              hostname: console.example.com
              labels: {}
      expected: |
        apiVersion: config.openshift.io/v1
        kind: Ingress
        spec:
          domain: apps.example.com
          componentRoutes:
            - name: console
              namespace: openshift-console
              hostname: console.example.com
    - name: Should reject componentRoutes with invalid label key
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Ingress
        spec:
          domain: apps.example.com
          componentRoutes:
            - name: console
              namespace: openshift-console
              hostname: console.example.com
              labels:
                "!!!bad": value
      expectedError: "label keys must be valid Kubernetes label keys"
    - name: Should reject componentRoutes with invalid label value
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Ingress
        spec:
          domain: apps.example.com
          componentRoutes:
            - name: console
              namespace: openshift-console
              hostname: console.example.com
              labels:
                ingress: "invalid value with spaces!"
      expectedError: "label values must be valid Kubernetes label values"
    - name: Should reject componentRoutes with more than 8 labels
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Ingress
        spec:
          domain: apps.example.com
          componentRoutes:
            - name: console
              namespace: openshift-console
              hostname: console.example.com
              labels:
                label1: value1
                label2: value2
                label3: value3
                label4: value4
                label5: value5
                label6: value6
                label7: value7
                label8: value8
                label9: value9
      expectedError: "Too many properties"
  onUpdate:
    - name: Should not be able to change domain once set
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Ingress
        spec:
          domain: apps.example.com
      updated: |
        apiVersion: config.openshift.io/v1
        kind: Ingress
        spec:
          domain: test.example.com
      expectedError: "domain is immutable once set"
    - name: Should be able to update other fields without changing domain
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Ingress
        spec:
          domain: apps.example.com
      updated: |
        apiVersion: config.openshift.io/v1
        kind: Ingress
        spec:
          domain: apps.example.com
          appsDomain: custom.example.com
      expected: |
        apiVersion: config.openshift.io/v1
        kind: Ingress
        spec:
          domain: apps.example.com
          appsDomain: custom.example.com
    - name: Should be able to add labels to componentRoutes on update
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Ingress
        spec:
          domain: apps.example.com
          componentRoutes:
            - name: console
              namespace: openshift-console
              hostname: console.example.com
      updated: |
        apiVersion: config.openshift.io/v1
        kind: Ingress
        spec:
          domain: apps.example.com
          componentRoutes:
            - name: console
              namespace: openshift-console
              hostname: console.example.com
              labels:
                ingress: shard-console
      expected: |
        apiVersion: config.openshift.io/v1
        kind: Ingress
        spec:
          domain: apps.example.com
          componentRoutes:
            - name: console
              namespace: openshift-console
              hostname: console.example.com
              labels:
                ingress: shard-console
