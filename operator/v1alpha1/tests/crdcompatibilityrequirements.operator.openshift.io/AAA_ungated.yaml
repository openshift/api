                names:
                  kind: TestRequirement
                  plural: testrequirements
                scope: Namespaced
                versions:
                - name: v1
                  served: true
                  storage: true
                  schema:
                    openAPIV3Schema:
                      type: object
          requiredVersions:
            defaultSet: StorageOnly
        customResourceDefinitionSchemaValidation:
          action: Deny
  - name: Should be able to create CRDCompatibilityRequirement with Warn action
    initial: |
      apiVersion: operator.openshift.io/v1alpha1
      kind: CRDCompatibilityRequirement
      metadata:
        name: test-requirement
      spec:
        compatibilitySchema:
