apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    api-approved.openshift.io: https://github.com/openshift/api/pull/2564
    api.openshift.io/filename-cvo-runlevel: "0000_30"
    api.openshift.io/filename-operator: cluster-api
    api.openshift.io/filename-ordering: "01"
    feature-gate.release.openshift.io/ClusterAPIMachineManagement: "true"
  name: clusterapis.operator.openshift.io
spec:
  group: operator.openshift.io
  names:
    kind: ClusterAPI
    listKind: ClusterAPIList
    plural: clusterapis
    singular: clusterapi
  scope: Cluster
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ClusterAPI provides configuration for the capi-operator.

          Compatibility level 4: No compatibility is provided, the API can change at any point for any reason. These capabilities should not be used by applications needing long term support.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec is the specification of the desired behavior of the
              capi-operator.
            properties:
              unmanagedCustomResourceDefinitions:
                description: |-
                  unmanagedCustomResourceDefinitions is a list of ClusterResourceDefinition (CRD)
                  names that should not be managed by the capi-operator installer
                  controller. This allows external actors to own specific CRDs while
                  capi-operator manages others.

                  Each CRD name must be a valid DNS-1123 subdomain consisting of lowercase
                  alphanumeric characters, '-' or '.', and must start and end with an
                  alphanumeric character, with a maximum length of 253 characters.
                  Example: "clusters.cluster.x-k8s.io"

                  Items cannot be removed from this list once added.

                  The maximum number of unmanagedCustomResourceDefinitions is 128.
                items:
                  maxLength: 253
                  type: string
                  x-kubernetes-validations:
                  - message: a lowercase RFC 1123 subdomain must consist of lower
                      case alphanumeric characters, '-' or '.', and must start and
                      end with an alphanumeric character.
                    rule: '!format.dns1123Subdomain().validate(self).hasValue()'
                maxItems: 128
                type: array
                x-kubernetes-list-type: set
                x-kubernetes-validations:
                - message: items cannot be removed from unmanagedCustomResourceDefinitions
                    list
                  rule: oldSelf.all(item, item in self)
            type: object
          status:
            description: status defines the observed status of the capi-operator.
            minProperties: 1
            properties:
              activeConfigMaps:
                description: |-
                  activeConfigMaps is a list of ConfigMap names that the installer
                  controller has successfully reconciled. This represents the currently
                  deployed CAPI provider components.

                  Each ConfigMap name must be a valid DNS-1123 label consisting of lowercase
                  alphanumeric characters or hyphens, starting and ending with an alphanumeric
                  character, with a maximum length of 63 characters.

                  This field is owned by the installer controller and is updated atomically after
                  a successful reconciliation.

                  The maximum number of activeConfigMaps is 128.
                items:
                  maxLength: 63
                  type: string
                  x-kubernetes-validations:
                  - message: each ConfigMap name must be a valid DNS1123 label consisting
                      of lowercase alphanumeric characters or hyphens, starting and
                      ending with an alphanumeric character
                    rule: '!format.dns1123Label().validate(self).hasValue()'
                maxItems: 128
                type: array
                x-kubernetes-list-type: atomic
              targetConfigMaps:
                description: |-
                  targetConfigMaps is a list of ConfigMap names that the staging controller
                  has validated and approved for reconciliation. The installer controller
                  will reconcile these ConfigMaps.

                  Each ConfigMap name must be a valid DNS-1123 label consisting of lowercase
                  alphanumeric characters or hyphens, starting and ending with an alphanumeric
                  character, with a maximum length of 63 characters.

                  This field is owned by the staging controller and is updated atomically to a
                  consistent set of transport ConfigMaps that have passed validation checks.

                  The maximum number of targetConfigMaps is 128.
                items:
                  maxLength: 63
                  type: string
                  x-kubernetes-validations:
                  - message: each ConfigMap name must be a valid DNS1123 label consisting
                      of lowercase alphanumeric characters or hyphens, starting and
                      ending with an alphanumeric character
                    rule: '!format.dns1123Label().validate(self).hasValue()'
                maxItems: 128
                type: array
                x-kubernetes-list-type: atomic
            type: object
        required:
        - metadata
        type: object
        x-kubernetes-validations:
        - message: unmanagedCustomResourceDefinitions cannot be unset once set
          rule: '!has(oldSelf.spec) || !has(oldSelf.spec.unmanagedCustomResourceDefinitions)
            || has(self.spec.unmanagedCustomResourceDefinitions)'
    served: true
    storage: true
    subresources:
      status: {}
