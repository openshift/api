apiVersion: apiextensions.k8s.io/v1 # Hack because controller-gen complains if we don't have this
name: "BGPBasedVIPManagement Infrastructure"
crdName: infrastructures.config.openshift.io
featureGates:
- BGPBasedVIPManagement
tests:
  onUpdate:
    - name: Should allow setting vipManagement to BGP on BareMetal
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Infrastructure
        spec:
          platformSpec:
            baremetal: {}
            type: BareMetal
      updated: |
        apiVersion: config.openshift.io/v1
        kind: Infrastructure
        spec:
          platformSpec:
            baremetal: {}
            type: BareMetal
        status:
          platform: BareMetal
          platformStatus:
            baremetal:
              vipManagement: BGP
            type: BareMetal
      expected: |
        apiVersion: config.openshift.io/v1
        kind: Infrastructure
        spec:
          platformSpec:
            baremetal: {}
            type: BareMetal
        status:
          platform: BareMetal
          platformStatus:
            baremetal:
              vipManagement: BGP
              loadBalancer:
                type: OpenShiftManagedDefault
            type: BareMetal
          cpuPartitioning: None
          infrastructureTopology: HighlyAvailable
          controlPlaneTopology: HighlyAvailable
    - name: Should reject changing vipManagement from BGP to Keepalived
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Infrastructure
        spec:
          platformSpec:
            baremetal: {}
            type: BareMetal
        status:
          platform: BareMetal
          platformStatus:
            baremetal:
              vipManagement: BGP
            type: BareMetal
      updated: |
        apiVersion: config.openshift.io/v1
        kind: Infrastructure
        spec:
          platformSpec:
            baremetal: {}
            type: BareMetal
        status:
          platform: BareMetal
          platformStatus:
            baremetal:
              vipManagement: Keepalived
            type: BareMetal
      expectedStatusError: 'platformStatus.baremetal.vipManagement: Invalid value: "string": vipManagement is immutable once set'
    - name: Should reject changing vipManagement from Keepalived to BGP
      initial: |
        apiVersion: config.openshift.io/v1
        kind: Infrastructure
        spec:
          platformSpec:
            baremetal: {}
            type: BareMetal
        status:
          platform: BareMetal
          platformStatus:
            baremetal:
              vipManagement: Keepalived
            type: BareMetal
      updated: |
        apiVersion: config.openshift.io/v1
        kind: Infrastructure
        spec:
          platformSpec:
            baremetal: {}
            type: BareMetal
        status:
          platform: BareMetal
          platformStatus:
            baremetal:
              vipManagement: BGP
            type: BareMetal
      expectedStatusError: 'platformStatus.baremetal.vipManagement: Invalid value: "string": vipManagement is immutable once set'
